<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V40 — OMNI-PREDATOR // TRAP-COUNTER ENGINE</title>
    <style>
        :root {
            --bg: #020202; --panel: #0a0a0c; --brd: #1a1a1c;
            --neon: #00f2ff; --win: #00ff41; --red: #ff003c; --gold: #ffd700;
        }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 950px; margin: auto; border: 2px solid var(--brd); padding: 15px; border-radius: 5px; position: relative; }
        
        /* Predator Status Area */
        .predator-core { background: #000; border: 1px solid var(--red); padding: 20px; margin-bottom: 20px; text-align: center; border-left: 10px solid var(--red); box-shadow: 0 0 20px rgba(255, 0, 60, 0.1); }
        .ai-title { font-size: 10px; letter-spacing: 5px; color: var(--red); display: block; margin-bottom: 5px; }
        .target-prediction { font-size: 60px; letter-spacing: 25px; color: #fff; text-shadow: 0 0 30px var(--win); margin: 10px 0; }
        .trap-meter { font-size: 14px; color: var(--gold); font-weight: bold; }

        /* Real-time History Sync */
        .history-sync { display: flex; gap: 15px; overflow-x: auto; padding: 15px; background: #050505; border: 1px solid var(--brd); margin-bottom: 20px; scrollbar-width: none; }
        .h-node { font-size: 40px; min-width: 50px; position: relative; filter: grayscale(0.5); transition: 0.3s; }
        .h-node.latest { filter: grayscale(0); transform: scale(1.2); border-bottom: 3px solid var(--win); }

        /* The Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .item-btn { background: #0d0d0f; border: 1px solid var(--brd); border-radius: 4px; padding: 20px 0; cursor: pointer; transition: 0.2s; position: relative; }
        .item-btn:hover { border-color: var(--neon); background: #111; }
        .emoji { font-size: 45px; display: block; margin-bottom: 10px; }
        .abs-num { font-size: 18px; color: var(--neon); font-weight: bold; }

        /* Prediction Matrix */
        .matrix { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .matrix-box { background: #080808; border: 1px solid var(--brd); padding: 15px; text-align: center; }
        .matrix-box h4 { font-size: 11px; margin: 0 0 10px 0; color: var(--gold); }
        .matrix-icons { font-size: 28px; letter-spacing: 8px; }

        /* Logic Table */
        .logic-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #050505; }
        .logic-table th, .logic-table td { padding: 12px; border: 1px solid var(--brd); text-align: center; }
        .logic-table th { color: var(--neon); text-transform: uppercase; }
        .danger-zone { background: rgba(255, 0, 60, 0.1); color: var(--red); font-weight: bold; }

        .sys-actions { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 15px; background: #111; border: 1px solid var(--brd); color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="predator-core">
        <span class="ai-title">OMNI-PREDATOR ACTIVE // TRAP DETECTOR V4.0</span>
        <div class="target-prediction" id="mainTarget">?? ?? ??</div>
        <div class="trap-meter" id="trapAlert">SENSING SERVER PATTERN...</div>
    </div>

    <div class="history-sync" id="syncBar"></div>

    <div class="grid">
        <button class="item-btn" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs-num" id="abs-corn">0</span></button>
        <button class="item-btn" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs-num" id="abs-tomato">0</span></button>
        <button class="item-btn" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs-val" id="abs-carrot">0</span></button>
        <button class="item-btn" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs-num" id="abs-pepper">0</span></button>
        <button class="item-btn" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs-num" id="abs-shrimp">0</span></button>
        <button class="item-btn" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs-num" id="abs-cow">0</span></button>
        <button class="item-btn" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs-num" id="abs-fish">0</span></button>
        <button class="item-btn" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs-num" id="abs-chicken">0</span></button>
    </div>

    <div class="matrix">
        <div class="matrix-box"><h4>STRAT 3+2</h4><div id="s32" class="matrix-icons">--</div></div>
        <div class="matrix-box" style="border-color: var(--win)"><h4>STRAT 3+3</h4><div id="s33" class="matrix-icons">--</div></div>
        <div class="matrix-box"><h4>STRAT 2+2</h4><div id="s22" class="matrix-icons">--</div></div>
    </div>

    <table class="logic-table">
        <thead>
            <tr><th>TARGET</th><th>ABSENCE</th><th>TRAP CHANCE</th><th>AI PRIORITY</th></tr>
        </thead>
        <tbody id="logicBody"></tbody>
    </table>

    <div class="sys-actions">
        <button class="action-btn" onclick="undo()">RECALL (UNDO)</button>
        <button class="action-btn" onclick="wipe()" style="color:var(--red)">TERMINATE DATA</button>
    </div>
</div>

<script>
    const veg = ["corn","tomato","carrot","pepper"];
    const meat = ["shrimp","cow","fish","chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("omni_db") || "[]");

    function add(f) {
        db.push(f); if(db.length > 2500) db.shift();
        localStorage.setItem("omni_db", JSON.stringify(db));
        update();
    }

    function update() {
        const len = db.length;
        const last = db[len-1];
        
        // 1. Live Sync Bar (History connected to Brain)
        let sHTML = "";
        for(let i=len-1; i>=Math.max(0, len-15); i--) {
            let cls = (i === len-1) ? "h-node latest" : "h-node";
            sHTML += `<div class="${cls}">${emojis[db[i]]}</div>`;
        }
        document.getElementById("syncBar").innerHTML = sHTML;

        // 2. The Trap-Counter Logic
        let scores = {};
        let logicHTML = "";
        let isTrapMode = false;

        // Check for "The Stacker Trap" (3+ repeats)
        let streak = 0;
        let j = len-1; while(j >= 0 && db[j] === last) { streak++; j--; }
        if(streak >= 2) isTrapMode = true;

        [...veg, ...meat].forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;

            // PREDICTOR FORMULA
            let base = abs * 10;
            
            // Link History to Prediction
            if(isTrapMode && f === last) {
                base += (streak * 300); // Follow the streak (The Momentum Mind)
            }
            
            // Anti-Trap Logic: If server shifts from meat to veg suddenly
            if(len > 1 && meat.includes(db[len-2]) && veg.includes(db[len-1])) {
                if(meat.includes(f)) base += 200; // Expected immediate meat return
            }

            scores[f] = base;
            let trapChance = (f === last) ? (streak * 25) : 0;
            let priority = Math.min(99, Math.round(base / 8));
            let rowCls = (priority > 80) ? "class='danger-zone'" : "";

            logicHTML += `<tr ${rowCls}><td>${emojis[f]}</td><td>${abs}</td><td>${trapChance}%</td><td>${priority}</td></tr>`;
        });
        document.getElementById("logicBody").innerHTML = logicHTML;

        // 3. Execution (The 3+2 / 3+3 / 2+2)
        const sv = veg.sort((a,b) => scores[b] - scores[a]);
        const sm = meat.sort((a,b) => scores[b] - scores[a]);

        const p32 = [...sv.slice(0,3), ...sm.slice(0,2)];
        const p33 = [...sv.slice(0,3), ...sm.slice(0,3)];
        const p22 = [...sv.slice(0,2), ...sm.slice(0,2)];

        document.getElementById("s32").innerText = p32.map(x=>emojis[x]).join("");
        document.getElementById("s33").innerText = p33.map(x=>emojis[x]).join("");
        document.getElementById("s22").innerText = p22.map(x=>emojis[x]).join("");
        document.getElementById("mainTarget").innerText = p33.slice(0,3).map(x=>emojis[x]).join("");

        // Trap Alert Text
        const alert = document.getElementById("trapAlert");
        if(isTrapMode) {
            alert.innerText = `🚨 TRAP DETECTED: ${emojis[last]} STREAK (x${streak}). RIDING WAVE!`;
            alert.style.color = "var(--red)";
        } else {
            alert.innerText = "SENSING SERVER PATTERN: STABLE RECOVERY MODE.";
            alert.style.color = "var(--win)";
        }
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("TERMINATE ENGINE MEMORY?")) { db=[]; localStorage.clear(); location.reload(); } }
    update();
</script>
</body>
</html>
