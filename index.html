l.i<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V29 — GHOST PROTOCOL // TRAP & SHIFT RADAR</title>
    <style>
        :root {
            --bg: #010409; --panel: #0d1117; --brd: #30363d;
            --neon: #58a6ff; --win: #238636; --gold: #f1e05a; --red: #f85149; --purple: #a371f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); }
        
        /* Stats Dashboard */
        .mega-dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #161b22; border: 1px solid var(--brd); padding: 8px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--neon); }
        .stat-card b { display: block; font-size: 15px; color: var(--gold); }

        /* Trap & Shift Alerts */
        .alerts-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .alert-box { padding: 10px; border-radius: 10px; font-size: 11px; font-weight: bold; text-align: center; border: 1px solid var(--brd); }
        .trap-active { background: rgba(248, 81, 73, 0.1); border-color: var(--red); color: var(--red); animation: pulse 1.5s infinite; }
        .shift-active { background: rgba(163, 113, 247, 0.1); border-color: var(--purple); color: var(--purple); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* History */
        .history-box { background: #000; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--brd); overflow-x: auto; display: flex; gap: 12px; }
        .h-item { font-size: 35px; min-width: 45px; position: relative; }
        .h-streak { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .btn-item { background: #161b22; border: 1px solid var(--brd); border-radius: 18px; padding: 15px 5px; cursor: pointer; text-align: center; position: relative; }
        .emoji { font-size: 45px; display: block; }
        .abs-val { font-size: 18px; color: var(--neon); font-weight: bold; }
        .prob-val { font-size: 10px; color: var(--win); position: absolute; top: 5px; right: 8px; font-weight: bold; }

        /* Strategy Boards */
        .strat-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .strat-card { background: #161b22; border: 1px solid var(--brd); padding: 10px; border-radius: 12px; text-align: center; }
        .strat-icons { font-size: 26px; letter-spacing: 5px; display: block; margin: 5px 0; }

        .console { background: #000; color: #39ff14; font-family: monospace; font-size: 11px; padding: 10px; height: 50px; border-radius: 10px; border: 1px solid var(--brd); overflow-y: auto; }
        .sys-btn { flex: 1; padding: 12px; border-radius: 10px; background: #21262d; color: white; border: 1px solid var(--brd); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="mega-dash">
        <div class="stat-card"><small>ACCURACY</small><b id="acc">0%</b></div>
        <div class="stat-card"><small>SYNC</small><b id="sync">0%</b></div>
        <div class="stat-card"><small>CHICKEN</small><b id="cGap">0</b></div>
        <div class="stat-card"><small>HEAT</small><b id="heat">0%</b></div>
        <div class="stat-card"><small>EVASION</small><b id="evade">LOW</b></div>
    </div>

    <div class="alerts-zone">
        <div id="trapRadar" class="alert-box">NO TRAP DETECTED</div>
        <div id="shiftRadar" class="alert-box">PATTERN STABLE</div>
    </div>

    <div class="history-box" id="history"></div>

    <div class="main-grid">
        <button class="btn-item" onclick="add('corn')"><span id="p-corn" class="prob-val">0%</span><span class="emoji">🌽</span><span class="abs-val" id="abs-corn">0</span></button>
        <button class="btn-item" onclick="add('tomato')"><span id="p-tomato" class="prob-val">0%</span><span class="emoji">🍅</span><span class="abs-val" id="abs-tomato">0</span></button>
        <button class="btn-item" onclick="add('carrot')"><span id="p-carrot" class="prob-val">0%</span><span class="emoji">🥕</span><span class="abs-val" id="abs-carrot">0</span></button>
        <button class="btn-item" onclick="add('pepper')"><span id="p-pepper" class="prob-val">0%</span><span class="emoji">🌶️</span><span class="abs-val" id="abs-pepper">0</span></button>
        <button class="btn-item" onclick="add('shrimp')"><span id="p-shrimp" class="prob-val">0%</span><span class="emoji">🦐</span><span class="abs-val" id="abs-shrimp">0</span></button>
        <button class="btn-item" onclick="add('cow')"><span id="p-cow" class="prob-val">0%</span><span class="emoji">🐄</span><span class="abs-val" id="abs-cow">0</span></button>
        <button class="btn-item" onclick="add('fish')"><span id="p-fish" class="prob-val">0%</span><span class="emoji">🐟</span><span class="abs-val" id="abs-fish">0</span></button>
        <button class="btn-item" onclick="add('chicken')"><span id="p-chicken" class="prob-val">0%</span><span class="emoji">🐔</span><span class="abs-val" id="abs-chicken">0</span></button>
    </div>

    <div class="strat-section">
        <div class="strat-card" style="border-top: 3px solid var(--win)"><small>4 PICKS</small><div id="p4" class="strat-icons">--</div></div>
        <div class="strat-card" style="border-top: 3px solid var(--neon)"><small>5 PICKS</small><div id="p5" class="strat-icons">--</div></div>
        <div class="strat-card" style="border-top: 3px solid var(--purple)"><small>6 PICKS</small><div id="p6" class="strat-icons">--</div></div>
    </div>

    <div class="console" id="log">SYSTEM READY. SCANNING FOR GHOST PATTERNS...</div>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="wipe()" style="color:var(--red)">RESET</button>
    </div>
</div>

<script>
    const items = ["corn","tomato","carrot","pepper","shrimp","cow","fish","chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v29_db") || "[]");
    let lastPicks = []; let wins = 0; let rounds = 0; let failStreak = 0;

    function log(m) { const l = document.getElementById("log"); l.innerHTML += `<br>> ${m}`; l.scrollTop = l.scrollHeight; }

    function add(f) {
        if(lastPicks.length > 0) {
            rounds++;
            if(lastPicks.includes(f)) { wins++; failStreak = 0; } else { failStreak++; }
        }
        db.push(f);
        if(db.length > 2000) db.shift();
        localStorage.setItem("v29_db", JSON.stringify(db));
        update();
    }

    function update() {
        let len = db.length; let scores = {};
        
        // History
        let historyHTML = ""; let streak = 1;
        for(let i = len-1; i >= Math.max(0, len-25); i--) {
            if(db[i] === db[i-1]) streak++; else {
                historyHTML += `<div class="h-item">${emojis[db[i]]}${streak>1?`<span class="h-streak">${streak}</span>`:''}</div>`;
                streak = 1;
            }
        }
        document.getElementById("history").innerHTML = historyHTML;

        // Logic & Trap Radar
        items.forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;
            scores[f] = (abs * 8) + (db.slice(-40).filter(x=>x===f).length * 12);
        });

        // Pattern Shift Detection
        let last5 = db.slice(-5);
        let last5Meat = last5.filter(x => ["shrimp","cow","fish","chicken"].includes(x)).length;
        let prev5 = db.slice(-10, -5);
        let prev5Meat = prev5.filter(x => ["shrimp","cow","fish","chicken"].includes(x)).length;
        
        const shiftR = document.getElementById("shiftRadar");
        if(Math.abs(last5Meat - prev5Meat) >= 3) {
            shiftR.innerText = "⚠️ PATTERN SHIFT DETECTED";
            shiftR.className = "alert-box shift-active";
        } else {
            shiftR.innerText = "PATTERN STABLE";
            shiftR.className = "alert-box";
        }

        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        
        // Trap Radar (Top Score is too high)
        const trapR = document.getElementById("trapRadar");
        if(sorted[0][1] > 300) {
            trapR.innerText = `🚨 TRAP RADAR: ${emojis[sorted[0][0]]} HIGH RISK`;
            trapR.className = "alert-box trap-active";
        } else {
            trapR.innerText = "NO TRAP DETECTED";
            trapR.className = "alert-box";
        }

        lastPicks = sorted.slice(0,6).map(x => x[0]);
        document.getElementById("p4").innerText = sorted.slice(0,4).map(x => emojis[x[0]]).join("");
        document.getElementById("p5").innerText = sorted.slice(0,5).map(x => emojis[x[0]]).join("");
        document.getElementById("p6").innerText = sorted.slice(0,6).map(x => emojis[x[0]]).join("");

        // Dashboard
        let acc = rounds > 0 ? Math.round((wins/rounds)*100) : 0;
        document.getElementById("acc").innerText = acc + "%";
        document.getElementById("sync").innerText = acc + "%";
        document.getElementById("evade").innerText = failStreak > 3 ? "HIGH" : "LOW";
        document.getElementById("heat").innerText = (last5Meat * 20) + "%";
        if(db.lastIndexOf('chicken') !== -1) document.getElementById("cGap").innerText = len - 1 - db.lastIndexOf('chicken');

        log(`Latest: ${emojis[db[len-1]]} | Evasion: ${failStreak}`);
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("RESET?")) { db=[]; localStorage.clear(); location.reload(); } }
    update();
</script>
</body>
</html>
