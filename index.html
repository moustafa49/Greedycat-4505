<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V23 — THE BEAST MODE // FULL INTERFACE</title>
    <style>
        :root {
            --bg: #010409; --panel: #0d1117; --brd: #30363d;
            --neon: #58a6ff; --win: #238636; --gold: #f1e05a; --red: #f85149; --purple: #a371f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); position: relative; }
        
        /* Dashboard */
        .header-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #161b22; border: 1px solid var(--brd); padding: 10px; border-radius: 12px; text-align: center; }
        .stat-card b { display: block; font-size: 18px; color: var(--neon); }

        /* Heat Bar */
        .heat-container { background: #000; height: 12px; border-radius: 6px; margin: 10px 0; border: 1px solid var(--brd); overflow: hidden; }
        .heat-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), var(--gold), var(--red)); transition: 0.8s; }

        /* History Ribbon */
        .history-ribbon { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 15px; border: 1px dashed var(--brd); }
        .hist-item { font-size: 24px; min-width: 35px; text-align: center; }

        /* Main Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-item { background: #161b22; border: 1px solid var(--brd); border-radius: 15px; padding: 15px 5px; cursor: pointer; transition: 0.2s; position: relative; }
        .emoji { font-size: 35px; display: block; }
        .abs-tag { font-size: 12px; color: var(--gold); font-weight: bold; margin-top: 5px; display: block; }
        
        /* Trap Overlay */
        #trapBox { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; }
        .trap-card { background: #161b22; padding: 25px; border: 2px solid var(--gold); border-radius: 15px; text-align: center; }

        .strat-box { background: #161b22; border: 1px solid var(--brd); padding: 15px; border-radius: 15px; text-align: center; border-top: 4px solid var(--purple); }
        .icons-row { font-size: 30px; letter-spacing: 8px; margin: 10px 0; display: block; }

        .console { background: #000; color: #39ff14; font-family: monospace; font-size: 11px; padding: 10px; height: 60px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--brd); }
        .sys-btn { flex: 1; padding: 12px; border-radius: 10px; background: #21262d; color: white; border: 1px solid var(--brd); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="trapBox">
        <div class="trap-card">
            <h2 style="color:var(--gold); margin:0;">⚠️ TRAP ALERT</h2>
            <p>السيرفر بيغريك بـ <span id="trapEmoji" style="font-size:30px;"></span></p>
            <button class="sys-btn" style="background:var(--win)" onclick="confirmTrap('legit')">فرصة حقيقية ✅</button>
            <button class="sys-btn" style="background:var(--red)" onclick="confirmTrap('trap')">دي جعفلة ❌</button>
        </div>
    </div>

    <div class="header-grid">
        <div class="stat-card"><small>SYNC</small><b id="sync">0%</b></div>
        <div class="stat-card"><small>ACCURACY</small><b id="acc">0%</b></div>
        <div class="stat-card"><small>SIGNAL</small><b id="sig">WAIT</b></div>
        <div class="stat-card"><small>CHICKEN</small><b id="cGap">0</b></div>
    </div>

    <div class="heat-container"><div id="heatFill" class="heat-fill"></div></div>

    <div class="history-ribbon" id="history">
        </div>

    <div class="grid">
        <button class="btn-item" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs-tag" id="abs-corn">0</span></button>
        <button class="btn-item" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs-tag" id="abs-tomato">0</span></button>
        <button class="btn-item" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs-tag" id="abs-carrot">0</span></button>
        <button class="btn-item" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs-tag" id="abs-pepper">0</span></button>
        <button class="btn-item" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs-tag" id="abs-shrimp">0</span></button>
        <button class="btn-item" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs-tag" id="abs-cow">0</span></button>
        <button class="btn-item" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs-tag" id="abs-fish">0</span></button>
        <button class="btn-item" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs-tag" id="abs-chicken">0</span></button>
    </div>

    <div class="strat-box">
        <small style="color:var(--gold)">BEST FORMATION (3+2 / 3+3)</small>
        <div id="formation" class="icons-row">--</div>
        <div id="advice" style="font-size:12px; color:var(--neon)">COLLECTING DATA...</div>
    </div>

    <div class="console" id="log">V23 BEAST MODE ACTIVE. HISTORY TRACKING ON.</div>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="wipe()" style="color:var(--red)">RESET</button>
    </div>
</div>

<script>
    const items = ["corn","tomato","carrot","pepper","shrimp","cow","fish","chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v23_db") || "[]");
    let weights = {}; let lastPred = []; let wins = 0; let rounds = 0; let activeTrap = null;

    function log(m) { const l = document.getElementById("log"); l.innerHTML += `<br>> ${m}`; l.scrollTop = l.scrollHeight; }

    function add(f) {
        if(lastPred.length > 0) { rounds++; if(lastPred.includes(f)) wins++; }
        db.push(f);
        if(db.length > 1000) db.shift();
        localStorage.setItem("v23_db", JSON.stringify(db));
        update();
    }

    function confirmTrap(type) {
        weights[activeTrap] = (type === 'trap') ? 0.2 : 3.0;
        document.getElementById("trapBox").style.display = "none";
        activeTrap = null;
        update();
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("Clear?")) { db=[]; localStorage.clear(); location.reload(); } }

    function update() {
        let len = db.length;
        let scores = {};
        
        // 1. History Ribbon
        document.getElementById("history").innerHTML = db.slice(-20).reverse().map(x => `<div class="hist-item">${emojis[x]}</div>`).join("");

        // 2. Heat & Logic
        let meatC = db.slice(-10).filter(x => ["shrimp","cow","fish","chicken"].includes(x)).length;
        document.getElementById("heatFill").style.width = (meatC * 10) + "%";

        items.forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;
            if(f === 'chicken') document.getElementById("cGap").innerText = abs;
            
            let weight = weights[f] || 1;
            scores[f] = (abs * 5) * weight;
        });

        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        lastPred = sorted.slice(0,5).map(x => x[0]);

        // 3. Trap Detect
        if(sorted[0][1] > 200 && sorted[0][0] !== activeTrap) {
            activeTrap = sorted[0][0];
            document.getElementById("trapEmoji").innerText = emojis[activeTrap];
            document.getElementById("trapBox").style.display = "flex";
        }

        // 4. UI Updates
        document.getElementById("sync").innerText = rounds > 0 ? Math.round((wins/rounds)*100) + "%" : "0%";
        document.getElementById("acc").innerText = rounds > 0 ? Math.round((wins/rounds)*100) + "%" : "0%";
        document.getElementById("formation").innerText = lastPred.map(x => emojis[x]).join("");
        
        let sig = document.getElementById("sig");
        if(meatC > 4) { sig.innerText = "STRIKE"; sig.style.color = "var(--win)"; }
        else { sig.innerText = "WAIT"; sig.style.color = "var(--gold)"; }

        log(`Result recorded: ${emojis[db[len-1]]}`);
    }

    update();
</script>
</body>
</html>
