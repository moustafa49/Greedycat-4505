<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<title>THE ZENITH V9 — ULTIMATE AI</title>
<style>
    :root {
        --bg: #030508; --panel: #0a0f18; --brd: #1a2333;
        --neon: #00f2ff; --win: #00ff88; --warn: #ff3366; --gold: #ffcc00;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
    .container { max-width: 1200px; margin: auto; }

    /* Top Intelligence Bar */
    .intel-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .intel-card { background: var(--panel); border: 1px solid var(--brd); padding: 15px; border-radius: 15px; position: relative; border-bottom: 3px solid var(--brd); }
    
    /* Server Mood & Wave */
    .wave-indicator { height: 6px; background: #1a2333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .wave-fill { height: 100%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

    /* Grid System */
    .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .btn-item { background: var(--panel); border: 2px solid var(--brd); border-radius: 20px; padding: 30px 5px; cursor: pointer; transition: 0.3s; position: relative; }
    .btn-item span { display: block; text-align: center; }
    .emoji { font-size: 45px; }
    .multi { font-size: 12px; color: var(--gold); font-weight: bold; margin-top: 5px; }

    /* AI Highlights */
    .prime-target { border-color: var(--neon) !important; box-shadow: 0 0 20px rgba(0,242,255,0.3); background: rgba(0,242,255,0.05); }
    .explode { animation: explode-pulse 0.6s infinite alternate; border-color: var(--warn) !important; }
    @keyframes explode-pulse { from { box-shadow: 0 0 5px var(--warn); } to { box-shadow: 0 0 25px var(--warn); } }

    /* Results & Strategy */
    .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .box { background: var(--panel); border: 1px solid var(--brd); border-radius: 20px; padding: 20px; }
    
    .history-strip { display: flex; gap: 8px; overflow-x: auto; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 1px solid var(--brd); margin-top: 15px; }
    .btn-sys { flex: 1; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; background: #1a2333; color: #fff; }
</style>
</head>
<body>

<div class="container">
    <div class="intel-bar">
        <div class="intel-card" id="waveCard">
            <div style="font-size: 11px; color: var(--neon)">SERVER WAVE ANALYSIS</div>
            <div id="waveStatus" style="font-size: 18px; font-weight: bold; margin: 5px 0">CALIBRATING...</div>
            <div class="wave-indicator"><div id="waveFill" class="wave-fill"></div></div>
        </div>
        <div class="intel-card">
            <div style="font-size: 11px; color: var(--win)">AI PREDICTION STRENGTH</div>
            <div id="aiPower" style="font-size: 24px; font-weight: bold">0%</div>
        </div>
        <div class="intel-card">
            <div style="font-size: 11px; color: var(--gold)">EXPECTED ACCURACY</div>
            <div id="accuracy" style="font-size: 24px; font-weight: bold">0%</div>
        </div>
    </div>

    <div class="main-grid" id="gameGrid">
        <button class="btn-item" onclick="add('corn')"><span class="emoji">🌽</span><span class="multi">5x</span></button>
        <button class="btn-item" onclick="add('tomato')"><span class="emoji">🍅</span><span class="multi">5x</span></button>
        <button class="btn-item" onclick="add('carrot')"><span class="emoji">🥕</span><span class="multi">5x</span></button>
        <button class="btn-item" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="multi">5x</span></button>
        <button class="btn-item" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="multi">10x</span></button>
        <button class="btn-item" onclick="add('cow')"><span class="emoji">🐄</span><span class="multi">15x</span></button>
        <button class="btn-item" onclick="add('fish')"><span class="emoji">🐟</span><span class="multi">25x</span></button>
        <button class="btn-item" onclick="add('chicken')"><span class="emoji">🐔</span><span class="multi">45x</span></button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px">
        <button class="btn-sys" onclick="undo()">UNDO</button>
        <button class="btn-sys" onclick="wipe()" style="color:var(--warn)">WIPE MEMORY</button>
        <button class="btn-sys" id="botToggle" onclick="toggleBot()">SYSTEM: STANDBY</button>
    </div>

    <div class="strategy-grid">
        <div class="box" style="border-left: 5px solid var(--neon)">
            <div style="font-size: 11px; color: var(--neon)">ZENITH TOP TARGETS</div>
            <div id="primeTarget" style="font-size: 50px; text-align: center">-- --</div>
        </div>
        <div class="box" style="border-left: 5px solid var(--gold)">
            <div style="font-size: 11px; color: var(--gold)">SMART 6-SLOT COVERAGE</div>
            <div id="top6Target" style="font-size: 40px; text-align: center; letter-spacing: 5px">-- -- -- -- -- --</div>
        </div>
    </div>

    <div class="box">
        <div style="font-size: 11px; color: var(--neon); margin-bottom: 10px">PROBABILITY MAP</div>
        <div id="probMap" style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px"></div>
    </div>

    <div class="history-strip" id="historyFeed"></div>
</div>

<script>
const items = ["corn","tomato","carrot","pepper","shrimp","cow","fish","chicken"];
const veg = ["corn","tomato","carrot","pepper"];
const meat = ["shrimp","cow","fish","chicken"];
const mults = {corn:5, tomato:5, carrot:5, pepper:5, shrimp:10, cow:15, fish:25, chicken:45};
const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};

let history = JSON.parse(localStorage.getItem("zenith_v9_db") || "[]");
let rounds = 0, wins = 0;

function save() { localStorage.setItem("zenith_v9_db", JSON.stringify(history)); }

function add(f) {
    if (window.lastP) {
        rounds++;
        if (window.lastP.includes(f)) wins++;
    }
    history.push(f);
    if (history.length > 2000) history.shift();
    save();
    update();
}

function undo() { history.pop(); save(); update(); }
function wipe() { if(confirm("Wipe all AI data?")) { history=[]; save(); update(); } }

function update() {
    let scores = {};
    let len = history.length;

    // 1. WAVE ANALYSIS
    let last12 = history.slice(-12);
    let meatCount = last12.filter(x => meat.includes(x)).length;
    let waveFill = document.getElementById("waveFill");
    let waveStatus = document.getElementById("waveStatus");
    
    let wavePower = (meatCount / 12) * 100;
    waveFill.style.width = wavePower + "%";
    
    if (wavePower > 40) {
        waveStatus.innerText = "PROFIT WAVE 🔥";
        waveFill.style.background = "var(--win)";
    } else if (wavePower < 15) {
        waveStatus.innerText = "RECOVERY WAVE ❄️";
        waveFill.style.background = "var(--warn)";
    } else {
        waveStatus.innerText = "NEUTRAL WAVE ⚖️";
        waveFill.style.background = "var(--neon)";
    }

    // 2. SCORING ENGINE (V9 Advanced)
    items.forEach(f => {
        let lastIdx = history.lastIndexOf(f);
        let abs = lastIdx === -1 ? len : len - 1 - lastIdx;
        
        // Deep Pattern Match (Length 3)
        let pat = 0;
        if (len > 4) {
            let seq = history.slice(-3).join(",");
            for(let i=0; i<len-4; i++) {
                if(history.slice(i, i+3).join(",") === seq && history[i+3] === f) pat += 50;
            }
        }
        
        let s = pat + (abs * 3) + (mults[f] * 1.2);
        // Overdue Spike
        if (abs > (250 / mults[f])) s *= 2; 
        scores[f] = s;
    });

    const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
    const best2 = [sorted[0][0], sorted[1][0]];

    // 3. ADAPTIVE TOP 6
    let top6;
    if (wavePower < 15) { // Safe mode
        top6 = [...sorted.filter(x => veg.includes(x[0])).slice(0, 4).map(x => x[0]), 
                ...sorted.filter(x => meat.includes(x[0])).slice(0, 2).map(x => x[0])];
    } else { // Aggressive mode
        top6 = [...sorted.filter(x => veg.includes(x[0])).slice(0, 3).map(x => x[0]), 
                ...sorted.filter(x => meat.includes(x[0])).slice(0, 3).map(x => x[0])];
    }
    window.lastP = top6;

    // 4. UI RENDER
    document.getElementById("primeTarget").innerText = best2.map(x => emojis[x]).join("");
    document.getElementById("top6Target").innerText = top6.map(x => emojis[x]).join("");
    document.getElementById("accuracy").innerText = `${rounds ? ((wins/rounds)*100).toFixed(1) : 0}%`;
    document.getElementById("aiPower").innerText = Math.min(99, Math.floor((sorted[0][1] / (sorted[2][1]||1)) * 45)) + "%";
    
    document.getElementById("historyFeed").innerHTML = history.slice(-20).reverse().map(x => `<span style="font-size:25px">${emojis[x]}</span>`).join("");

    document.getElementById("probMap").innerHTML = items.map(f => {
        let a = len - 1 - history.lastIndexOf(f);
        if (history.lastIndexOf(f) === -1) a = len;
        return `<div class="intel-card" style="padding:5px; text-align:center">
            <div style="font-size:18px">${emojis[f]}</div>
            <div style="font-size:10px; color:var(--gold)">A:${a}</div>
        </div>`;
    }).join("");

    // Grid Effects
    const btns = document.querySelectorAll(".btn-item");
    items.forEach((f, i) => {
        btns[i].className = "btn-item";
        if (f === best2[0]) btns[i].classList.add("prime-target");
        if ((len - 1 - history.lastIndexOf(f)) > (250 / mults[f])) btns[i].classList.add("explode");
    });
}

function toggleBot() {
    let b = document.getElementById("botToggle");
    b.innerText = b.innerText.includes("STANDBY") ? "SYSTEM: ACTIVE" : "SYSTEM: STANDBY";
    b.style.background = b.innerText.includes("ACTIVE") ? "var(--win)" : "#1a2333";
}

update();
</script>
</body>
</html>
