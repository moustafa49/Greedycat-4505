<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V37 — THE PREDICTOR PRO // STACKING ENGINE</title>
    <style>
        :root {
            --bg: #050505; --panel: #101216; --brd: #30363d;
            --neon: #58a6ff; --win: #238636; --gold: #f1e05a; --red: #f85149; --purple: #a371f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); box-shadow: 0 0 40px rgba(35, 134, 54, 0.15); }
        
        /* AI Status Bar */
        .ai-header { background: #161b22; border-left: 5px solid var(--win); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ai-mode { font-weight: bold; color: var(--win); text-shadow: 0 0 10px var(--win); }
        .ai-thought { font-size: 13px; color: var(--gold); font-weight: 500; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-node { background: #000; border: 1px solid var(--brd); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-node b { display: block; font-size: 16px; color: var(--neon); }

        /* History */
        .history-box { background: #000; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--brd); display: flex; gap: 15px; overflow-x: auto; }
        .h-item { font-size: 40px; min-width: 50px; position: relative; }
        .h-streak { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 11px; padding: 2px 7px; border-radius: 12px; font-weight: bold; }

        /* Interaction Grid */
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .btn-item { background: #1c2128; border: 1px solid var(--brd); border-radius: 20px; padding: 20px 5px; cursor: pointer; text-align: center; transition: 0.2s; }
        .btn-item:hover { border-color: var(--win); transform: translateY(-3px); }
        .emoji { font-size: 50px; display: block; }
        .abs-val { font-size: 20px; color: var(--neon); font-weight: bold; }

        /* THE AI PREDICTION CARD */
        .ai-card { background: #161b22; border: 1px solid var(--brd); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-top: 5px solid var(--purple); }
        .strat-line { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #30363d; }
        .strat-name { font-size: 14px; font-weight: bold; color: var(--gold); }
        .strat-res { font-size: 35px; letter-spacing: 15px; }

        /* Intel Table */
        .intel-table { width: 100%; border-collapse: collapse; background: #000; border-radius: 15px; overflow: hidden; font-size: 13px; margin-bottom: 15px; }
        .intel-table th, .intel-table td { padding: 12px; border: 1px solid var(--brd); text-align: center; }
        .intel-table th { background: #1c2128; color: var(--neon); }
        .highlight-stack { background: rgba(35, 134, 54, 0.2); color: var(--win); font-weight: bold; }

        .sys-btn { flex: 1; padding: 15px; border-radius: 12px; background: #21262d; color: white; border: 1px solid var(--brd); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-header">
        <div class="ai-mode" id="aiMode">AI: MONITORING CYCLES</div>
        <div class="ai-thought" id="aiThought">Waiting for pattern entry...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-node"><small>SYNC</small><b id="sync">0%</b></div>
        <div class="stat-node"><small>ACTIVE STACK</small><b id="stackText">NONE</b></div>
        <div class="stat-node"><small>CYCLE TYPE</small><b id="cycleType">NEUTRAL</b></div>
        <div class="stat-node"><small>WIN RATE</small><b id="winRate">0%</b></div>
    </div>

    <div class="history-box" id="history"></div>

    <div class="main-grid">
        <button class="btn-item" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs-val" id="abs-corn">0</span></button>
        <button class="btn-item" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs-val" id="abs-tomato">0</span></button>
        <button class="btn-item" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs-val" id="abs-carrot">0</span></button>
        <button class="btn-item" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs-val" id="abs-pepper">0</span></button>
        <button class="btn-item" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs-val" id="abs-shrimp">0</span></button>
        <button class="btn-item" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs-val" id="abs-cow">0</span></button>
        <button class="btn-item" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs-val" id="abs-fish">0</span></button>
        <button class="btn-item" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs-val" id="abs-chicken">0</span></button>
    </div>

    <div class="ai-card">
        <div class="strat-line">
            <div class="strat-name">AI PREDICTION (3+2)</div>
            <div id="s32" class="strat-res">--</div>
        </div>
        <div class="strat-line">
            <div class="strat-name">AI PREDICTION (3+3)</div>
            <div id="s33" class="strat-res">--</div>
        </div>
        <div class="strat-line">
            <div class="strat-name">AI PREDICTION (2+2)</div>
            <div id="s22" class="strat-res">--</div>
        </div>
    </div>

    <table class="intel-table">
        <thead>
            <tr><th>ITEM</th><th>ABS</th><th>PROBABILITY</th><th>STATUS</th></tr>
        </thead>
        <tbody id="intelBody"></tbody>
    </table>

    <div style="display:flex; gap:10px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="wipe()" style="color:var(--red)">RESET ENGINE</button>
    </div>
</div>

<script>
    const veg = ["corn","tomato","carrot","pepper"];
    const meat = ["shrimp","cow","fish","chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v37_db") || "[]");
    let wins = 0; let rounds = 0; let lastPicks = [];

    function add(f) {
        if(lastPicks.length > 0) { rounds++; if(lastPicks.includes(f)) wins++; }
        db.push(f); if(db.length > 3000) db.shift();
        localStorage.setItem("v37_db", JSON.stringify(db));
        update();
    }

    function update() {
        let len = db.length;
        let vScores = {}; let mScores = {};
        let intelHTML = "";
        
        // 1. STACK DETECTION (العصب الحسي)
        let activeStack = null;
        let stackCount = 0;
        if(len >= 1) {
            activeStack = db[len-1];
            let i = len-1; while(i >= 0 && db[i] === activeStack) { stackCount++; i--; }
        }

        // 2. HISTORY
        let hHTML = ""; let s = 1;
        for(let i=len-1; i>=Math.max(0, len-25); i--) {
            if(db[i] === db[i-1]) s++; else {
                hHTML += `<div class="h-item">${emojis[db[i]]}${s>1?`<span class="h-streak">${s}</span>`:''}</div>`;
                s = 1;
            }
        }
        document.getElementById("history").innerHTML = hHTML;

        // 3. AI BRAIN SCORING (التوقع التكراري)
        [...veg, ...meat].forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;
            
            // Equation: Absence + Frequency + REPEAT_WEIGHT
            let baseScore = (abs * 10);
            
            // الـ AI هنا بيفهم التكرار:
            if(f === activeStack) {
                // لو الصنف لسه ظاهر حالا، ارفع احتماليته جدا عشان يلحق التكرار
                baseScore += (stackCount * 150); 
            }

            if(veg.includes(f)) vScores[f] = baseScore; else mScores[f] = baseScore;

            let prob = Math.min(99, Math.round(baseScore / 5));
            let status = (f === activeStack && stackCount >= 2) ? "STREAKING" : "STABLE";
            let rowClass = (f === activeStack && stackCount >= 2) ? "class='highlight-stack'" : "";
            intelHTML += `<tr ${rowClass}><td>${emojis[f]}</td><td>${abs}</td><td>${prob}%</td><td>${status}</td></tr>`;
        });
        document.getElementById("intelBody").innerHTML = intelHTML;

        const sv = Object.entries(vScores).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
        const sm = Object.entries(mScores).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);

        // 4. STRATEGIES (3+2, 3+3, 2+2)
        const p32 = [...sv.slice(0,3), ...sm.slice(0,2)];
        const p33 = [...sv.slice(0,3), ...sm.slice(0,3)];
        const p22 = [...sv.slice(0,2), ...sm.slice(0,2)];
        lastPicks = p33;

        document.getElementById("s32").innerText = p32.map(x=>emojis[x]).join("");
        document.getElementById("s33").innerText = p33.map(x=>emojis[x]).join("");
        document.getElementById("s22").innerText = p22.map(x=>emojis[x]).join("");

        // 5. AI THOUGHT LOGIC
        const mode = document.getElementById("aiMode");
        const thought = document.getElementById("aiThought");
        document.getElementById("stackText").innerText = activeStack ? `${emojis[activeStack]} x${stackCount}` : "NONE";
        document.getElementById("winRate").innerText = rounds > 0 ? Math.round((wins/rounds)*100) + "%" : "0%";

        if(stackCount >= 2) {
            mode.innerText = "AI: STREAK DETECTION ACTIVE";
            thought.innerText = `Server is repeating ${emojis[activeStack]}. Pattern suggests follow the streak.`;
            document.getElementById("cycleType").innerText = "STREAKING";
        } else {
            mode.innerText = "AI: ANALYZING CYCLES";
            thought.innerText = "Pattern is shifting. Predictive scoring calibrated to absence.";
            document.getElementById("cycleType").innerText = "SHIFTING";
        }
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("RESET BRAIN?")) { db=[]; localStorage.clear(); location.reload(); } }
    update();
</script>
</body>
</html>
