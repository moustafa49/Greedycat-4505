<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V66 — THE STREAK RIDER // PATTERN MIRROR</title>
    <style>
        :root { --bg: #010101; --panel: #0d1117; --brd: #30363d; --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff003c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--brd); padding: 12px; border-radius: 20px; background: var(--panel); }
        
        /* الكروت العلوية: تركيز كامل على التكرار */
        .live-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .card { background: #000; border: 1px solid var(--brd); border-radius: 12px; padding: 10px 5px; text-align: center; transition: 0.3s; }
        .card.active { border-color: var(--win); box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .card .emoji { font-size: 30px; display: block; }
        .card .type { font-size: 8px; font-weight: bold; color: var(--gold); margin: 4px 0; text-transform: uppercase; }
        .card .val { font-size: 12px; color: var(--win); font-weight: bold; }

        .status-strip { background: #000; border: 1px solid var(--neon); border-radius: 10px; padding: 8px; text-align: center; margin-bottom: 15px; font-size: 11px; font-weight: bold; }

        .groups { border: 1px solid var(--gold); border-radius: 15px; background: rgba(0,0,0,0.4); padding: 10px; margin-bottom: 15px; }
        .g-row { padding: 10px 0; border-bottom: 1px solid #222; text-align: center; }
        .g-row:last-child { border-bottom: none; }
        .g-title { font-size: 9px; color: var(--gold); letter-spacing: 2px; margin-bottom: 6px; font-weight: bold; }
        .g-icons { display: flex; justify-content: center; gap: 12px; font-size: 22px; }

        .history { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .h-node { min-width: 38px; height: 38px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 12px; padding: 15px 0; cursor: pointer; color: #fff; }
        .btn span { font-size: 12px; color: var(--neon); display: block; margin-top: 5px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #161b22; color: var(--neon); padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #111; }
        .win-txt { color: var(--win); font-weight: bold; }

        .sys { display: flex; gap: 10px; margin-top: 10px; }
        .sys-btn { flex: 1; padding: 14px; border-radius: 10px; background: #21262d; color: #fff; border: 1px solid var(--brd); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="liveCards" class="live-cards"></div>

    <div class="status-strip" id="statusBox">ANALYZING STREAK PATTERNS...</div>

    <div class="groups">
        <div class="g-row">
            <div class="g-title">OMNI 6 (3+3 STREAK FOCUS)</div>
            <div id="g6" class="g-icons"></div>
        </div>
        <div class="g-row">
            <div class="g-title">ULTRA 5 (3+2 BALANCE)</div>
            <div id="g5" class="g-icons"></div>
        </div>
        <div class="g-row">
            <div class="g-title">STABLE 4 (2+2 SYNC)</div>
            <div id="g4" class="g-icons"></div>
        </div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<span id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')">🍅<span id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')">🥕<span id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')">🌶️<span id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')">🦐<span id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')">🐄<span id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')">🐟<span id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')">🐔<span id="abs-chicken">0</span></button>
    </div>

    <table>
        <thead><tr><th>TARGET</th><th>ABS</th><th>SCORE</th><th>REASON</th></tr></thead>
        <tbody id="stats"></tbody>
    </table>

    <div class="sys">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:var(--red)">CLEAR BRAIN</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"], meat = ["shrimp", "cow", "fish", "chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v66_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("Reset?")) { db = []; save(); } }
    function save() { localStorage.setItem("v66_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        const last = db[len-1], p2 = db[len-2], p3 = db[len-3];

        let hHTML = ""; for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        let scores = {}, reasons = {};
        [...veg, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;
            
            // 🔥 نظام سكور التكرار الجديد 🔥
            let s = abs * 5; reasons[f] = "SCAN";

            // إذا تكرر الصنف ورا بعض (Streak Rider)
            if (f === last) { 
                s = 5000; 
                if (f === p2) s = 7500; // لو تكرر مرتين السكور بيعلى أكتر
                if (f === p2 && f === p3) s = 10000; // موجة تكرار قوية
                reasons[f] = "STREAK"; 
            }
            
            // نمط التبادل (ZigZag)
            else if (f === p2 && last !== f) { s = 4500; reasons[f] = "ZIGZAG"; }
            
            // نظام الجعفلة (Sector Shift) بناءً على صورك
            let vLast10 = db.slice(-10).filter(x => veg.includes(x)).length;
            if ((vLast10 >= 7 && meat.includes(f)) || (vLast10 <= 3 && veg.includes(f))) {
                if (s < 2150) { s = 2150 + (abs * 2); reasons[f] = "SHIFT"; }
            }

            scores[f] = s;
        });

        document.getElementById("statusBox").innerText = (last === p2) ? "🔥 STRONG STREAK DETECTED - FOLLOW WAVE" : "STABLE PATTERN ANALYSIS";

        let sV = [...veg].sort((a,b) => scores[b] - scores[a]);
        let sM = [...meat].sort((a,b) => scores[b] - scores[a]);

        // كروت التوقعات (مبنية على التكرار)
        let top4 = [...sV.slice(0,2), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("liveCards").innerHTML = top4.map(x => `
            <div class="card ${reasons[x]=='STREAK'?'active':''}">
                <span class="emoji">${emojis[x]}</span>
                <span class="type">${reasons[x]}</span>
                <span class="val">${Math.round(scores[x])}</span>
            </div>
        `).join("");

        // المجموعات 2+2 و 3+2 و 3+3
        const d = (l) => l.map(x => emojis[x]).join(" ");
        document.getElementById("g6").innerText = d([...sV.slice(0,3), ...sM.slice(0,3)].sort((a,b) => scores[b] - scores[a]));
        document.getElementById("g5").innerText = d([...sV.slice(0,3), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]));
        document.getElementById("g4").innerText = d([...sV.slice(0,2), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]));

        let all = [...veg, ...meat].sort((a,b) => scores[b] - scores[a]);
        let tHTML = "";
        all.forEach(f => {
            tHTML += `<tr><td>${emojis[f]}</td><td>${document.getElementById(`abs-${f}`).innerText}</td><td class="${scores[f]>2000?'win-txt':''}">${Math.round(scores[f])}</td><td class="${scores[f]>2000?'win-txt':''}">${reasons[f]}</td></tr>`;
        });
        document.getElementById("stats").innerHTML = tHTML;
    }
    update();
</script>
</body>
</html>
