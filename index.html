<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V47 — THE DEEP BETRAYAL // THE FINAL BRAIN</title>
    <style>
        :root {
            --bg: #020202; --panel: #0a0c10; --brd: #1f2328;
            --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff3e3e; --betray: #ff7b00;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: auto; border: 2px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); box-shadow: 0 0 30px rgba(255, 123, 0, 0.15); }
        
        /* The Betrayal Header */
        .betrayal-header { background: #000; border: 2px solid var(--betray); border-radius: 15px; padding: 25px; margin-bottom: 20px; text-align: center; position: relative; }
        .prediction-text { font-size: 65px; letter-spacing: 20px; color: #fff; text-shadow: 0 0 20px var(--betray); margin: 15px 0; }
        .status-msg { font-size: 14px; color: var(--gold); font-weight: bold; text-transform: uppercase; }

        /* History Sync Bar */
        .history-sync { display: flex; gap: 10px; overflow-x: auto; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--brd); }
        .h-node { font-size: 38px; min-width: 50px; text-align: center; transition: 0.3s; }
        .h-node:first-child { border-bottom: 3px solid var(--betray); transform: scale(1.15); }

        /* Grid Controls */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .btn-core { background: #161b22; border: 1px solid var(--brd); border-radius: 15px; padding: 15px 0; cursor: pointer; text-align: center; }
        .btn-core:active { transform: translateY(3px); filter: brightness(1.5); }
        .emoji { font-size: 45px; display: block; }
        .abs-val { font-size: 16px; color: var(--neon); font-weight: bold; }

        /* Strategy Matrix */
        .matrix { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-box { background: #0d1117; border: 1px solid var(--brd); padding: 15px; text-align: center; border-radius: 12px; }
        .m-icons { font-size: 28px; letter-spacing: 8px; }

        /* Intel Table */
        .intel-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #000; }
        .intel-table th, .intel-table td { padding: 12px; border: 1px solid var(--brd); text-align: center; }
        .row-danger { background: rgba(255, 62, 62, 0.15); color: var(--red); font-weight: bold; }
        .row-betray { background: rgba(255, 123, 0, 0.15); color: var(--betray); font-weight: bold; }

        .f-btn { width: 100%; padding: 15px; background: #21262d; border: 1px solid var(--brd); color: #fff; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="betrayal-header">
        <span style="color:var(--betray); font-size: 10px; letter-spacing: 5px;">DEEP BRAIN V47 // PATTERN BETRAYAL DETECTOR</span>
        <div class="prediction-text" id="mainTarget">?? ?? ??</div>
        <div id="aiAnalysis" class="status-msg">SCANNING 20-TURN HISTORY...</div>
    </div>

    <div class="history-sync" id="history"></div>

    <div class="grid">
        <button class="btn-core" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs-val" id="abs-corn">0</span></button>
        <button class="btn-core" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs-val" id="abs-tomato">0</span></button>
        <button class="btn-core" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs-val" id="abs-carrot">0</span></button>
        <button class="btn-core" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs-val" id="abs-pepper">0</span></button>
        <button class="btn-core" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs-val" id="abs-shrimp">0</span></button>
        <button class="btn-core" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs-val" id="abs-cow">0</span></button>
        <button class="btn-core" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs-val" id="abs-fish">0</span></button>
        <button class="btn-core" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs-val" id="abs-chicken">0</span></button>
    </div>

    <div class="matrix">
        <div class="m-box"><h6>3+2 PATTERN</h6><div id="s32" class="m-icons">--</div></div>
        <div class="m-box" style="border-color: var(--betray);"><h6>3+3 ANTI-TRAP</h6><div id="s33" class="m-icons">--</div></div>
        <div class="m-box"><h6>2+2 STREAK</h6><div id="s22" class="m-icons">--</div></div>
    </div>

    <table class="intel-table">
        <thead>
            <tr><th>TARGET</th><th>ABS</th><th>SCORE</th><th>SIGNAL</th></tr>
        </thead>
        <tbody id="intelBody"></tbody>
    </table>

    <div style="display:flex; gap:10px;">
        <button class="f-btn" onclick="undo()">UNDO</button>
        <button class="f-btn" onclick="wipe()" style="color:var(--red)">RESET AI BRAIN</button>
    </div>
</div>

<script>
    const veg = ["corn","tomato","carrot","pepper"];
    const meat = ["shrimp","cow","fish","chicken"];
    const rare = ["chicken", "fish"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v47_db") || "[]");

    function add(f) {
        db.push(f); if(db.length > 3000) db.shift();
        localStorage.setItem("v47_db", JSON.stringify(db));
        update();
    }

    function update() {
        const len = db.length;
        const last = db[len-1];
        const last20 = db.slice(-20);
        
        let hHTML = "";
        for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        let scores = {};
        let tableHTML = "";

        // العثور على أكثر صنفين تكراراً في الـ 20 دور الأخيرة (النمط اللي السيرفر بيفخّه)
        let counts = {};
        last20.forEach(x => counts[x] = (counts[x] || 0) + 1);
        let sortedCounts = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
        let trapItems = sortedCounts.slice(0, 2); // الصنفين المسيطرين

        [...veg, ...meat].forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;

            let score = abs * 5;
            
            // 1. تكرار لحظي (لو لسه رامي حاجة بيكررها)
            if (f === last) score += 600;

            // 2. كشف "الخيانة" (لو النمط المسيطر فلفل/طماطم، ارفع نسبة الأصناف اللي بره النمط ده)
            if (last20.length >= 10 && !trapItems.includes(f) && abs > 5) {
                score += 500; // توقع "الخروج من النمط"
            }

            // 3. ذكاء النوادر (الفرخة والسمكة)
            if (rare.includes(f) && abs > 40) score += (abs * 20);

            // 4. زجزاج (🌶️🍅🌶️ -> 🍅)
            if (len >= 3 && db[len-1] !== db[len-2] && db[len-3] === db[len-1] && f === db[len-2]) score += 800;

            scores[f] = score;
            let signal = (f === last) ? "STREAK" : (trapItems.includes(f) ? "TRAP?" : "BETRAYAL");
            let rowCls = (f === last) ? "class='row-streak'" : (score > 1000 ? "class='row-betray'" : "");

            tableHTML += `<tr ${rowCls}><td>${emojis[f]}</td><td>${abs}</td><td>${Math.round(score)}</td><td>${signal}</td></tr>`;
        });
        document.getElementById("intelBody").innerHTML = tableHTML;

        // استخراج التوقعات (دمج بين المكرر والخيانة)
        const sv = veg.sort((a,b) => scores[b] - scores[a]);
        const sm = meat.sort((a,b) => scores[b] - scores[a]);
        
        const p33 = [...sv.slice(0,3), ...sm.slice(0,3)];
        document.getElementById("s32").innerText = [...sv.slice(0,3), ...sm.slice(0,2)].map(x=>emojis[x]).join("");
        document.getElementById("s33").innerText = p33.map(x=>emojis[x]).join("");
        document.getElementById("s22").innerText = [...sv.slice(0,2), ...sm.slice(0,2)].map(x=>emojis[x]).join("");
        document.getElementById("mainTarget").innerText = p33.slice(0,3).map(x=>emojis[x]).join("");

        const analysis = document.getElementById("aiAnalysis");
        if (last20.filter(x => trapItems.includes(x)).length > 12) {
            analysis.innerText = `🚨 TRAP ALERT: ${emojis[trapItems[0]]} & ${emojis[trapItems[1]]} OVERLOAD. EXPECTING BETRAYAL!`;
            analysis.style.color = "var(--betray)";
        } else {
            analysis.innerText = "SCANNING 20-TURN HISTORY... PATTERN STABLE.";
            analysis.style.color = "var(--gold)";
        }
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("ERASE ALL MEMORY?")) { db=[]; localStorage.clear(); location.reload(); } }
    update();
</script>
</body>
</html>
