<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<title>ULTIMATE COMMANDER V12 — FINAL EDITION</title>
<style>
    :root {
        --bg: #020617; --panel: #0f172a; --brd: #1e293b;
        --neon: #38bdf8; --win: #22c55e; --gold: #eab308; --red: #ef4444;
    }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; padding: 10px; }
    .container { max-width: 1200px; margin: auto; }
    
    /* Stats Hub */
    .hub { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .card { background: var(--panel); border: 1px solid var(--brd); padding: 15px; border-radius: 15px; text-align: center; position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--brd); border-radius: 15px 15px 0 0; }

    /* Main Grid */
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .btn { background: var(--panel); border: 2px solid var(--brd); border-radius: 20px; padding: 25px 5px; cursor: pointer; transition: 0.2s; }
    .btn span { display: block; text-align: center; }
    .emoji { font-size: 45px; }
    .mult { font-size: 11px; color: var(--gold); font-weight: bold; }

    /* Strategy Panels */
    .strat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .strat-box { background: var(--panel); border: 1px solid var(--brd); border-radius: 15px; padding: 15px; border-top: 4px solid var(--brd); }
    .strat-title { font-size: 11px; color: var(--neon); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
    .icons { font-size: 30px; letter-spacing: 5px; text-align: center; display: block; }

    /* Money Management Table */
    .money-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
    .money-table td { border: 1px solid var(--brd); padding: 8px; text-align: center; }
    .money-table tr.active { background: rgba(34, 197, 94, 0.1); color: var(--win); }

    /* Effects */
    .gold-glow { animation: gold-glow 0.8s infinite alternate; border-color: var(--gold) !important; }
    @keyframes gold-glow { from { box-shadow: 0 0 5px var(--gold); } to { box-shadow: 0 0 20px var(--gold); } }
    
    .history { display: flex; gap: 8px; overflow-x: auto; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid var(--brd); }
    .ctrl-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; background: #1e293b; color: white; }
</style>
</head>
<body>

<div class="container">
    <div class="hub">
        <div class="card" style="border-bottom: 3px solid var(--neon)">
            <div style="font-size:10px; color:var(--neon)">SERVER MOOD</div>
            <div id="serverMood" style="font-weight:bold; font-size:18px">SCANNING...</div>
        </div>
        <div class="card" style="border-bottom: 3px solid var(--gold)">
            <div style="font-size:10px; color:var(--gold)">SIGNAL STRENGTH</div>
            <div id="signalPower" style="font-weight:bold; font-size:22px">0%</div>
        </div>
        <div class="card" style="border-bottom: 3px solid var(--win)">
            <div style="font-size:10px; color:var(--win)">PROFIT ADVISOR</div>
            <div id="betAdvice" style="font-weight:bold">STANDBY</div>
        </div>
    </div>

    <div class="grid">
        <button class="btn" onclick="add('corn')"><span class="emoji">🌽</span><span class="mult">x5</span></button>
        <button class="btn" onclick="add('tomato')"><span class="emoji">🍅</span><span class="mult">x5</span></button>
        <button class="btn" onclick="add('carrot')"><span class="emoji">🥕</span><span class="mult">x5</span></button>
        <button class="btn" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="mult">x5</span></button>
        <button class="btn" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="mult">x10</span></button>
        <button class="btn" onclick="add('cow')"><span class="emoji">🐄</span><span class="mult">x15</span></button>
        <button class="btn" onclick="add('fish')"><span class="emoji">🐟</span><span class="mult">x25</span></button>
        <button class="btn" onclick="add('chicken')"><span class="emoji">🐔</span><span class="mult">x45</span></button>
    </div>

    <div class="strat-grid">
        <div class="strat-box" style="border-color: var(--neon)">
            <div class="strat-title">Defensive (3V + 3M)</div>
            <div id="p33" class="icons">--</div>
        </div>
        <div class="strat-box" style="border-color: var(--win)">
            <div class="strat-title">Safety (3V + 2M)</div>
            <div id="p32" class="icons">--</div>
        </div>
        <div class="strat-box" style="border-color: var(--gold)">
            <div class="strat-title">Aggressive (2V + 3M)</div>
            <div id="p23" class="icons">--</div>
        </div>
        <div class="strat-box" style="border-color: var(--red)">
            <div class="strat-title">Sniper (2V + 2M)</div>
            <div id="p22" class="icons">--</div>
        </div>
    </div>

    <div class="hub">
        <div class="card" style="grid-column: span 2">
            <div class="strat-title" style="text-align:left">Smart Staking Plan (إدارة الرهان)</div>
            <table class="money-table">
                <thead><tr><td>Signal</td><td>Bet Unit</td><td>Multiplier</td></tr></thead>
                <tbody id="stakeBody">
                    <tr id="row-weak"><td>WEAK</td><td>1x</td><td>Min. Stake</td></tr>
                    <tr id="row-med"><td>MEDIUM</td><td>3x</td><td>Target Highs</td></tr>
                    <tr id="row-strong"><td>STRONG</td><td>10x</td><td>MAX POWER</td></tr>
                </tbody>
            </table>
        </div>
        <div class="card">
            <div class="strat-title">Audio Alert</div>
            <button onclick="toggleAudio()" id="audioBtn" class="ctrl-btn" style="padding:10px; font-size:12px">🔇 Sound OFF</button>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px">
        <button class="ctrl-btn" onclick="undo()">UNDO</button>
        <button class="ctrl-btn" onclick="wipe()" style="color:var(--red)">FACTORY RESET</button>
    </div>

    <div class="history" id="historyFeed"></div>
</div>

<script>
const items = ["corn","tomato","carrot","pepper","shrimp","cow","fish","chicken"];
const veg = ["corn","tomato","carrot","pepper"];
const meat = ["shrimp","cow","fish","chicken"];
const mults = {corn:5, tomato:5, carrot:5, pepper:5, shrimp:10, cow:15, fish:25, chicken:45};
const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};

let history = JSON.parse(localStorage.getItem("cmd_v12_db") || "[]");
let audioEnabled = false;

function toggleAudio() {
    audioEnabled = !audioEnabled;
    document.getElementById("audioBtn").innerText = audioEnabled ? "🔊 Sound ON" : "🔇 Sound OFF";
}

function playAlert() {
    if(!audioEnabled) return;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

function save() { localStorage.setItem("cmd_v12_db", JSON.stringify(history)); }
function add(f) { history.push(f); if(history.length > 2000) history.shift(); save(); update(); }
function undo() { history.pop(); save(); update(); }
function wipe() { if(confirm("Reset all?")) { history=[]; save(); update(); } }

function update() {
    let scores = {};
    let len = history.length;

    items.forEach(f => {
        let lastIdx = history.lastIndexOf(f);
        let abs = lastIdx === -1 ? len : len - 1 - lastIdx;
        let pat = 0;
        if (len > 5) {
            let seq = history.slice(-3).join(",");
            for(let i=0; i<len-5; i++) {
                if(history.slice(i, i+3).join(",") === seq && history[i+3] === f) pat += 70;
            }
        }
        let s = pat + (abs * 4.5) + (mults[f] * 2);
        if (abs > (280 / mults[f])) s *= 2.2;
        scores[f] = s;
    });

    const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
    const topV = sorted.filter(x => veg.includes(x[0])).map(x => x[0]);
    const topM = sorted.filter(x => meat.includes(x[0])).map(x => x[0]);

    // Strategies
    document.getElementById("p33").innerText = [...topV.slice(0,3), ...topM.slice(0,3)].map(x => emojis[x]).join("");
    document.getElementById("p32").innerText = [...topV.slice(0,3), ...topM.slice(0,2)].map(x => emojis[x]).join("");
    document.getElementById("p23").innerText = [...topV.slice(0,2), ...topM.slice(0,3)].map(x => emojis[x]).join("");
    document.getElementById("p22").innerText = [...topV.slice(0,2), ...topM.slice(0,2)].map(x => emojis[x]).join("");

    // Power & Advice
    let power = Math.min(99, Math.floor((sorted[0][1] / (sorted[2][1]||1)) * 38));
    document.getElementById("signalPower").innerText = power + "%";
    
    const advice = document.getElementById("betAdvice");
    const rows = ["row-weak", "row-med", "row-strong"];
    rows.forEach(r => document.getElementById(r).className = "");

    if(power > 85) {
        advice.innerText = "MAX POWER!"; advice.style.color = "var(--win)";
        document.getElementById("row-strong").className = "active";
        playAlert();
    } else if(power > 55) {
        advice.innerText = "GOOD CHANCE"; advice.style.color = "var(--gold)";
        document.getElementById("row-med").className = "active";
    } else {
        advice.innerText = "WAITING..."; advice.style.color = "#94a3b8";
        document.getElementById("row-weak").className = "active";
    }

    // Server Mood
    let mCount = history.slice(-12).filter(x => meat.includes(x)).length;
    document.getElementById("serverMood").innerText = mCount > 4 ? "AGGRESSIVE 🔥" : (mCount < 2 ? "PASSIVE ❄️" : "BALANCED ⚖️");

    // Grid & History
    document.getElementById("historyFeed").innerHTML = history.slice(-20).reverse().map(x => `<span style="font-size:25px">${emojis[x]}</span>`).join("");
    const btns = document.querySelectorAll(".btn");
    items.forEach((f, i) => {
        btns[i].className = "btn";
        if(f === sorted[0][0]) btns[i].classList.add("gold-glow");
    });
}

update();
</script>
</body>
</html>
