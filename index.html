<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V22 — THE GHOST ENGINE // FINAL ASCENSION</title>
    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --brd: #30363d;
            --neon: #58a6ff; --win: #238636; --gold: #f1e05a; --red: #f85149; --ghost: #e6edf3;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 25px; background: #0d1117; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
        
        /* Heat Map & Ghost Tracker */
        .ghost-header { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 20px; }
        .heat-bar-container { background: #161b22; height: 30px; border-radius: 15px; border: 1px solid var(--brd); overflow: hidden; position: relative; }
        .heat-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), var(--gold), var(--red)); transition: 0.5s; }
        
        .dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #161b22; border: 1px solid var(--brd); padding: 10px; border-radius: 15px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-item { background: #161b22; border: 1px solid var(--brd); border-radius: 20px; padding: 15px 5px; cursor: pointer; position: relative; transition: 0.2s; }
        .emoji { font-size: 35px; display: block; }
        .abs-tag { font-size: 10px; color: var(--neon); font-weight: bold; }

        /* Status Effects */
        .ready-to-strike { border: 2px solid var(--win) !important; box-shadow: 0 0 20px var(--win); animation: strike 0.5s infinite alternate; }
        @keyframes strike { from { transform: scale(1); } to { transform: scale(1.05); } }

        .formation-box { background: #161b22; border: 1px solid var(--brd); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .icons-lg { font-size: 30px; letter-spacing: 10px; margin: 10px 0; display: block; }

        .console { background: #000; color: #00ff00; font-family: 'Courier New', monospace; font-size: 11px; padding: 10px; height: 80px; overflow-y: auto; border-radius: 10px; border: 1px solid #333; }
        .sys-btn { flex: 1; padding: 12px; border-radius: 10px; background: #21262d; color: #fff; border: 1px solid var(--brd); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="ghost-header">
        <div class="heat-bar-container">
            <div id="heatFill" class="heat-fill"></div>
            <small style="position:absolute; top:5px; left:45%; color:white; font-weight:bold;">SERVER TEMPERATURE</small>
        </div>
        <div class="stat-card" id="ghostStatus" style="border-color: var(--neon)">
            <small>GHOST SYNC</small>
            <b id="syncPercent">0%</b>
        </div>
    </div>

    <div class="dash">
        <div class="stat-card"><small>ACCURACY</small><b id="acc">0%</b></div>
        <div class="stat-card"><small>STREAK</small><b id="streak">0</b></div>
        <div class="stat-card"><small>MOOD</small><b id="mood">SCANNING</b></div>
        <div class="stat-card"><small>SIGNAL</small><b id="signal">WAIT</b></div>
    </div>

    <div class="grid">
        <button class="btn-item" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs-tag" id="abs-corn">0</span></button>
        <button class="btn-item" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs-tag" id="abs-tomato">0</span></button>
        <button class="btn-item" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs-tag" id="abs-carrot">0</span></button>
        <button class="btn-item" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs-tag" id="abs-pepper">0</span></button>
        <button class="btn-item" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs-tag" id="abs-shrimp">0</span></button>
        <button class="btn-item" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs-tag" id="abs-cow">0</span></button>
        <button class="btn-item" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs-tag" id="abs-fish">0</span></button>
        <button class="btn-item" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs-tag" id="abs-chicken">0</span></button>
    </div>

    <div class="formation-box" id="mainFormationBox">
        <h4 style="margin:0; color:var(--gold);">RECOMMENDED STRATEGY (3+2 / 3+3)</h4>
        <div id="formationIcons" class="icons-lg">--</div>
        <div id="aiAdvice" style="font-size:12px; color:var(--neon);">WAITING FOR DATA SYNC...</div>
    </div>

    <div class="console" id="log">GHOST ENGINE V22 BOOTING... DONE.</div>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="wipe()" style="color:var(--red)">WIPE MEMORY</button>
    </div>
</div>

<script>
    const items = ["corn","tomato","carrot","pepper","shrimp","cow","fish","chicken"];
    const meat = ["shrimp","cow","fish","chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v22_db") || "[]");
    let ghostWins = 0; let totalRounds = 0; let serverHeat = 0;

    function log(m) { const l = document.getElementById("log"); l.innerHTML += `<br>> ${m}`; l.scrollTop = l.scrollHeight; }

    function add(f) {
        // اختبار التوقع الوهمي قبل الإضافة
        const currentPred = getTopPrediction();
        if(currentPred.length > 0) {
            totalRounds++;
            if(currentPred.includes(f)) ghostWins++;
        }

        db.push(f);
        if(db.length > 1500) db.shift();
        localStorage.setItem("v22_db", JSON.stringify(db));
        update();
    }

    function getTopPrediction() {
        // محرك داخلي سريع للتوقع
        let scores = {};
        items.forEach(i => {
            let last = db.lastIndexOf(i);
            scores[i] = (last === -1) ? db.length : db.length - 1 - last;
        });
        return Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>x[0]);
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("Wipe?")) { db=[]; localStorage.clear(); location.reload(); } }

    function update() {
        let len = db.length;
        let scores = {};
        
        // 1. حساب الحرارة (Server Heat)
        let last5 = db.slice(-5);
        let meatCount = last5.filter(x => meat.includes(x)).length;
        serverHeat = (meatCount / 5) * 100;
        document.getElementById("heatFill").style.width = serverHeat + "%";

        // 2. مزامنة الشبح (Ghost Sync)
        let sync = totalRounds > 0 ? Math.round((ghostWins/totalRounds)*100) : 0;
        document.getElementById("syncPercent").innerText = sync + "%";

        // 3. تحليل الأصناف
        items.forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;
            scores[f] = abs * (f === 'chicken' ? 0.5 : 1); 
        });

        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const top5 = sorted.slice(0,5).map(x => x[0]);

        // 4. الواجهة الذكية
        document.getElementById("formationIcons").innerText = top5.map(x => emojis[x]).join("");
        
        const advice = document.getElementById("aiAdvice");
        const box = document.getElementById("mainFormationBox");
        
        if(sync > 70 && len > 10) {
            advice.innerText = "🔥 ENGINE SYNCED: HIGH ACCURACY DETECTED. STRIKE!";
            box.classList.add("ready-to-strike");
            document.getElementById("signal").innerText = "STRIKE";
            document.getElementById("signal").style.color = "var(--win)";
        } else {
            advice.innerText = "⌛ SYNCING: COLLECTING SERVER PATTERNS...";
            box.classList.remove("ready-to-strike");
            document.getElementById("signal").innerText = "WAIT";
            document.getElementById("signal").style.color = "var(--gold)";
        }

        document.getElementById("acc").innerText = sync + "%";
        document.getElementById("mood").innerText = serverHeat > 60 ? "HOT" : "COLD";
        
        log(`ROUND ${len}: Result ${emojis[db[len-1]]} | Sync: ${sync}%`);
    }

    update();
</script>
</body>
</html>
