<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V68 — THE MASTERMIND</title>
    <style>
        :root { --bg: #050505; --panel: #0d1117; --brd: #30363d; --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; border: 1px solid var(--brd); border-radius: 20px; padding: 15px; background: var(--panel); }
        
        /* القسم العلوي (التوقعات المباشرة) */
        .live-picks { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .p-card { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px 5px; text-align: center; }
        .p-card.hot { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .p-card .emoji { font-size: 32px; display: block; margin-bottom: 5px; }
        .p-card .tag { font-size: 8px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .p-card .perc { font-size: 11px; color: var(--win); font-weight: bold; }

        /* المجموعات الإجبارية (2+2, 3+2, 3+3) */
        .group-box { border: 1.5px solid var(--gold); border-radius: 15px; padding: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.4); }
        .g-item { text-align: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .g-item:last-child { border-bottom: none; }
        .g-label { font-size: 9px; color: var(--gold); letter-spacing: 2px; font-weight: bold; margin-bottom: 5px; }
        .g-icons { display: flex; justify-content: center; gap: 12px; font-size: 22px; }

        .history { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; }
        .h-node { min-width: 35px; height: 35px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 10px; padding: 15px 0; cursor: pointer; color: #fff; }
        .btn span { font-size: 11px; color: var(--neon); display: block; margin-top: 4px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { color: var(--neon); padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #111; }
        .score-win { color: var(--win); font-weight: bold; }

        .sys { display: flex; gap: 10px; }
        .sys-btn { flex: 1; padding: 12px; border-radius: 10px; background: #21262d; border: 1px solid var(--brd); color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="livePicks" class="live-picks"></div>

    <div class="group-box">
        <div class="g-item">
            <div class="g-label">OMNI 6 (3 VEG + 3 MEAT)</div>
            <div id="g6" class="g-icons"></div>
        </div>
        <div class="g-item">
            <div class="g-label">ULTRA 5 (3 VEG + 2 MEAT)</div>
            <div id="g5" class="g-icons"></div>
        </div>
        <div class="g-item">
            <div class="g-label">STABLE 4 (2 VEG + 2 MEAT)</div>
            <div id="g4" class="g-icons"></div>
        </div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<span id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')">🍅<span id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')">🥕<span id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')">🌶️<span id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')">🦐<span id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')">🐄<span id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')">🐟<span id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')">🐔<span id="abs-chicken">0</span></button>
    </div>

    <table>
        <thead><tr><th>TARGET</th><th>ABS</th><th>SCORE</th><th>REASON</th></tr></thead>
        <tbody id="stats"></tbody>
    </table>

    <div class="sys" style="margin-top:15px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:#ff4d4d">CLEAR BRAIN</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"], meat = ["shrimp", "cow", "fish", "chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v68_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("Reset?")) { db = []; save(); } }
    function save() { localStorage.setItem("v68_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        const last = db[len-1], p2 = db[len-2];

        let hHTML = ""; for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        let scores = {}, reasons = {};
        [...veg, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;
            
            let s = abs * 10; let r = "SCAN";

            // 🔥 منطق الصور: التكرار أولاً 🔥
            if (abs === 0) { s = 5000; r = "STREAK"; }
            else if (abs === 1 && f === p2) { s = 4500; r = "ZIGZAG"; }
            else if (abs >= 14) { s = 2178; r = "SHIFT"; }
            else if (abs > 7) { s = 1600; r = "SHIFT"; }

            scores[f] = s; reasons[f] = r;
        });

        let sV = [...veg].sort((a,b) => scores[b] - scores[a]);
        let sM = [...meat].sort((a,b) => scores[b] - scores[a]);

        // تحديث كروت الـ Live Picks
        let top4 = [...sV.slice(0,2), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("livePicks").innerHTML = top4.map(x => `
            <div class="p-card ${reasons[x]=='STREAK'?'hot':''}">
                <span class="emoji">${emojis[x]}</span>
                <span class="tag">${reasons[x]}</span>
                <span class="perc">${Math.round(scores[x]/5000*100)}%</span>
            </div>
        `).join("");

        // تحديث المجموعات الإجبارية
        const d = (list) => list.map(x => emojis[x]).join(" ");
        document.getElementById("g6").innerText = d([...sV.slice(0,3), ...sM.slice(0,3)].sort((a,b) => scores[b] - scores[a]));
        document.getElementById("g5").innerText = d([...sV.slice(0,3), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]));
        document.getElementById("g4").innerText = d([...sV.slice(0,2), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]));

        // الجدول
        let all = [...veg, ...meat].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("stats").innerHTML = all.map(f => `
            <tr><td>${emojis[f]}</td><td>${document.getElementById(`abs-${f}`).innerText}</td><td class="score-win">${Math.round(scores[f])}</td><td class="score-win">${reasons[f]}</td></tr>
        `).join("");
    }
    update();
</script>
</body>
</html>
