<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V63 — THE ULTIMATE SYMPHONY // PRO EDITION</title>
    <style>
        :root { --bg: #050505; --panel: #0d1117; --brd: #30363d; --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff003c; --purple: #bc13fe; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--brd); padding: 12px; border-radius: 20px; background: var(--panel); box-shadow: 0 0 30px #000; }
        
        /* 🔥 Top Display (Image 7 style) 🔥 */
        .live-status { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 12px; }
        .main-prediction { font-size: 42px; letter-spacing: 12px; text-shadow: 0 0 15px var(--neon); }
        .conf-bar { height: 4px; background: #222; border-radius: 10px; margin: 10px auto; width: 80%; overflow: hidden; }
        #confFill { height: 100%; background: var(--win); width: 0%; transition: 0.8s; }

        /* 🔥 Live Picks Cards (Image 3 style) 🔥 */
        .live-picks-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .live-card { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 10px; padding: 8px 2px; text-align: center; }
        .live-card img, .live-card span.emoji { font-size: 26px; display: block; margin-bottom: 5px; }
        .status-label { font-size: 7px; font-weight: bold; text-transform: uppercase; display: block; }
        .perc-label { font-size: 10px; color: var(--win); font-weight: bold; }

        /* 🔥 Groups Section (Image 4 & 7) 🔥 */
        .groups-box { border: 1px solid var(--gold); border-radius: 12px; background: rgba(0,0,0,0.5); padding: 10px; margin-bottom: 12px; }
        .group-row { display: flex; flex-direction: column; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .group-row:last-child { border-bottom: none; }
        .group-label { font-size: 8px; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; font-weight: bold; }
        .group-icons { display: flex; gap: 8px; font-size: 18px; }

        /* Sector Warning Bar */
        .warning-strip { font-size: 9px; text-align: center; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .sat-bar { height: 5px; display: flex; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 1px solid #333; }

        /* History & Controls */
        .history { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; }
        .h-node { min-width: 35px; height: 35px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 10px; padding: 12px 0; cursor: pointer; color: #fff; }
        .btn .abs { font-size: 12px; color: var(--neon); display: block; margin-top: 4px; font-weight: bold; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 10px; background: #000; border-radius: 8px; overflow: hidden; }
        th { background: #161b22; color: var(--neon); padding: 8px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #111; }
        .high-score { color: var(--win); font-weight: bold; }
        .jafala-score { color: var(--purple); font-weight: bold; }

        .sys-btns { display: flex; gap: 10px; margin-top: 10px; }
        .sys-btn { flex: 1; padding: 12px; border-radius: 8px; background: #21262d; color: #fff; border: 1px solid var(--brd); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="live-status">
        <div id="mainPred" class="main-prediction">?? ?? ??</div>
        <div class="conf-bar"><div id="confFill"></div></div>
        <div style="font-size: 9px; color: var(--win); letter-spacing: 1px;">AI STATUS: NEURAL PATTERN LOCKED</div>
    </div>

    <div id="livePicks" class="live-picks-grid"></div>

    <div class="warning-strip" id="warnText">STABLE SECTOR</div>
    <div class="sat-bar"><div id="vBar" style="background:var(--neon); width:50%"></div><div id="mBar" style="background:var(--red); width:50%"></div></div>

    <div class="groups-box">
        <div class="group-row">
            <div class="group-label">OMNI 6 (3+3 MIXED)</div>
            <div id="g6" class="group-icons"></div>
        </div>
        <div class="group-row">
            <div class="group-label">ULTRA 5 (3+2 BALANCED)</div>
            <div id="g5" class="group-icons"></div>
        </div>
        <div class="group-row">
            <div class="group-label">STABLE 4 (2+2 FORCED)</div>
            <div id="g4" class="group-icons"></div>
        </div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<span class="abs" id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')">🍅<span class="abs" id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')">🥕<span class="abs" id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')">🌶️<span class="abs" id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')">🦐<span class="abs" id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')">🐄<span class="abs" id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')">🐟<span class="abs" id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')">🐔<span class="abs" id="abs-chicken">0</span></button>
    </div>

    <table>
        <thead><tr><th>TARGET</th><th>ABS</th><th>SCORE</th><th>CONFIDENCE</th></tr></thead>
        <tbody id="stats"></tbody>
    </table>

    <div class="sys-btns">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:var(--red)">FULL RESET</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"], meat = ["shrimp", "cow", "fish", "chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v63_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("Reset Brain?")) { db = []; save(); } }
    function save() { localStorage.setItem("v63_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        const last = db[len-1], p2 = db[len-2], p3 = db[len-3];

        // History UI
        let hHTML = ""; for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        // Saturation Logic
        let vCount = db.slice(-10).filter(x => veg.includes(x)).length;
        document.getElementById("vBar").style.width = (vCount * 10) + "%";
        document.getElementById("mBar").style.width = (100 - (vCount * 10)) + "%";
        document.getElementById("warnText").innerText = vCount >= 7 ? "VEG SATURATED ⚠️ TARGET MEAT" : (vCount <= 3 ? "MEAT SATURATED ⚠️ TARGET VEG" : "STABLE SECTOR");

        let scores = {}, reasons = {}, confs = {};
        [...veg, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;
            
            let s = abs * 15; reasons[f] = "NORMAL";
            
            // 🔥 AI Scoring Logic (Based on Image 4 & 7) 🔥
            if (f === last) { s = 5000; reasons[f] = "STREAK"; }
            else if (f === p3 && last === p2) { s = 4500; reasons[f] = "ZIGZAG"; }
            else if (abs > 30) { s = 3000 + (abs * 2); reasons[f] = "RE-ENTRY"; }
            
            // Jafala Detection (Sector Flip)
            if ((vCount >= 8 && meat.includes(f)) || (vCount <= 2 && veg.includes(f))) {
                s += 2000; reasons[f] = "SHIFT";
            }
            
            scores[f] = s;
            confs[f] = Math.min(99, Math.round((s / 5000) * 100));
        });

        // Forced Balanced Sorting
        let sV = [...veg].sort((a,b) => scores[b] - scores[a]);
        let sM = [...meat].sort((a,b) => scores[b] - scores[a]);

        // Live Cards UI
        let top4 = [...sV.slice(0,2), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("livePicks").innerHTML = top4.map(x => `
            <div class="live-card">
                <span class="emoji">${emojis[x]}</span>
                <span class="status-label" style="color:${reasons[x]=='STREAK'?'var(--win)':(reasons[x]=='ZIGZAG'?'var(--neon)':'var(--gold)')}">${reasons[x]}</span>
                <span class="perc-label">${confs[x]}%</span>
            </div>
        `).join("");

        // Groups UI
        const drawGroup = (list) => list.map(x => emojis[x]).join(" ");
        document.getElementById("g6").innerText = drawGroup([...sV.slice(0,3), ...sM.slice(0,3)].sort((a,b) => scores[b] - scores[a]));
        document.getElementById("g5").innerText = drawGroup([...sV.slice(0,3), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]));
        document.getElementById("g4").innerText = drawGroup([...sV.slice(0,2), ...sM.slice(0,2)].sort((a,b) => scores[b] - scores[a]));

        // Table UI
        let allSorted = [...veg, ...meat].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("mainPred").innerText = allSorted.slice(0,3).map(x => emojis[x]).join(" ");
        document.getElementById("confFill").style.width = confs[allSorted[0]] + "%";

        let tHTML = "";
        allSorted.forEach(f => {
            tHTML += `<tr><td>${emojis[f]}</td><td>${document.getElementById(`abs-${f}`).innerText}</td><td class="${scores[f]>2000?'high-score':''}">${Math.round(scores[f])}</td><td class="perc-label">${confs[f]}%</td></tr>`;
        });
        document.getElementById("stats").innerHTML = tHTML;
    }
    update();
</script>
</body>
</html>
