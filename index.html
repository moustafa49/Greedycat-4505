<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V60 — THE NEURAL OVERLORD // AI LEARNING</title>
    <style>
        :root {
            --bg: #010101; --panel: #0d1117; --brd: #30363d;
            --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff003c; --rare: #bc13fe;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); box-shadow: 0 0 50px #000; }
        
        /* Master Header */
        .header { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 12px; position: relative; }
        .main-icons { font-size: 48px; letter-spacing: 12px; text-shadow: 0 0 20px var(--neon); }
        .pwr-bar { height: 4px; background: #222; width: 80%; margin: 10px auto; border-radius: 10px; overflow: hidden; }
        #pwrFill { height: 100%; background: var(--win); width: 0%; transition: 0.5s; }

        /* 🔥 TRI-LEVEL PICKS PANEL (2+2, 3+2, 3+3) 🔥 */
        .picks-box { background: rgba(0,0,0,0.6); border: 1.5px solid var(--gold); border-radius: 15px; padding: 12px; margin-bottom: 15px; }
        .pick-row { display: flex; flex-direction: column; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .pick-row:last-child { border-bottom: none; }
        .label { font-size: 10px; color: var(--gold); letter-spacing: 3px; font-weight: bold; margin-bottom: 6px; }
        .icons-wrap { display: flex; gap: 15px; font-size: 26px; filter: drop-shadow(0 0 5px var(--gold)); }
        .reason-tag { font-size: 8px; color: var(--neon); margin-top: 2px; }

        .history { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 10px; }
        .h-node { font-size: 26px; min-width: 38px; height: 38px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 12px; padding: 12px 0; cursor: pointer; color: #fff; }
        .btn .abs { font-size: 12px; color: var(--neon); display: block; font-weight: bold; margin-top: 5px; }

        /* Table Analysis */
        table { width: 100%; border-collapse: collapse; font-size: 10px; background: #000; border-radius: 10px; }
        th { background: #161b22; color: var(--neon); padding: 8px; border-bottom: 1px solid var(--brd); }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #111; }
        .win-txt { color: var(--win); font-weight: bold; }
        .rare-txt { color: var(--rare); font-weight: bold; }

        .sys-btn { flex: 1; padding: 14px; border-radius: 12px; background: #21262d; color: #fff; border: 1px solid var(--brd); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="prediction" class="main-icons">?? ?? ??</div>
        <div class="pwr-bar"><div id="pwrFill"></div></div>
        <div id="aiBrain" style="font-size: 10px; color: var(--gold);">NEURAL CORE: STANDBY</div>
    </div>

    <div class="picks-box">
        <div class="pick-row">
            <div class="label">OMNI 6 (3 VEG + 3 MEAT)</div>
            <div id="picks6" class="icons-wrap">-- -- -- -- -- --</div>
        </div>
        <div class="pick-row">
            <div class="label">ULTRA 5 (3 VEG + 2 MEAT)</div>
            <div id="picks5" class="icons-wrap">-- -- -- -- --</div>
        </div>
        <div class="pick-row">
            <div class="label">STABLE 4 (2 VEG + 2 MEAT)</div>
            <div id="picks4" class="icons-wrap">-- -- -- --</div>
        </div>
    </div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<span class="abs" id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')">🍅<span class="abs" id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')">🥕<span class="abs" id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')">🌶️<span class="abs" id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')">🦐<span class="abs" id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')">🐄<span class="abs" id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')">🐟<span class="abs" id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')">🐔<span class="abs" id="abs-chicken">0</span></button>
    </div>

    <table>
        <thead><tr><th>TARGET</th><th>ABS</th><th>SCORE</th><th>REASON</th></tr></thead>
        <tbody id="stats"></tbody>
    </table>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:var(--red)">CLEAR BRAIN</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"];
    const meat = ["shrimp", "cow", "fish", "chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v60_db") || "[]");

    function add(f) { db.push(f); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("Reset?")) { db = []; save(); } }
    function save() { localStorage.setItem("v60_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        const last = db[len-1], p2 = db[len-2], p3 = db[len-3], p4 = db[len-4];

        // History
        let hHTML = ""; for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        let scores = {}, reasons = {};
        [...veg, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;
            
            // 🔥 ADVANCED AI LOGIC 🔥
            let s = abs * 10;
            reasons[f] = "SCANNING";

            // 1. التكرار (Streak Control)
            if (f === last) { s += 5000; reasons[f] = "STREAK"; }
            
            // 2. النمط المتكرر (Pattern Recognition) - زي فلفل فلفل طماطم فلفل فلفل
            if (f === last && p2 === last) { s += 2000; reasons[f] = "HEAVY STREAK"; }
            if (f === p3 && last === p2) { s += 4000; reasons[f] = "PATTERN XY"; }

            // 3. الجعفلة (Jafala Detection) - لو السيرفر كسر النمط فجأة
            if (last !== p2 && last !== p3 && f === p4) { s += 2500; reasons[f] = "JAFALA HIT"; }

            // 4. الغياب الطويل (Due/Rare)
            if (abs > 35) { s += (abs * 30); reasons[f] = "RARE DUE"; }

            // 5. ميزان القطاعات (Sector Balancing)
            let last5 = db.slice(-5);
            let vCount = last5.filter(x => veg.includes(x)).length;
            if (vCount >= 4 && meat.includes(f)) { s += 1500; reasons[f] = "SECTOR SHIFT"; }

            scores[f] = s;
        });

        // 🔥 FORCED BALANCED PICKS (2+2, 3+2, 3+3) 🔥
        let sVeg = [...veg].sort((a,b) => scores[b] - scores[a]);
        let sMeat = [...meat].sort((a,b) => scores[b] - scores[a]);

        // 6 Picks (3+3)
        let o6 = [...sVeg.slice(0,3), ...sMeat.slice(0,3)].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("picks6").innerHTML = o6.map(x => `<div>${emojis[x]}<div class="reason-tag">${reasons[x]}</div></div>`).join("");

        // 5 Picks (3 Veg + 2 Meat)
        let o5 = [...sVeg.slice(0,3), ...sMeat.slice(0,2)].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("picks5").innerHTML = o5.map(x => `<div>${emojis[x]}<div class="reason-tag">${reasons[x]}</div></div>`).join("");

        // 4 Picks (2 Veg + 2 Meat)
        let o4 = [...sVeg.slice(0,2), ...sMeat.slice(0,2)].sort((a,b) => scores[b] - scores[a]);
        document.getElementById("picks4").innerHTML = o4.map(x => `<div>${emojis[x]}<div class="reason-tag">${reasons[x]}</div></div>`).join("");

        // Table
        let sorted = [...veg, ...meat].sort((a,b) => scores[b] - scores[a]);
        let tHTML = "";
        sorted.forEach(f => {
            let cl = reasons[f] !== "SCANNING" ? "class='win-txt'" : "";
            tHTML += `<tr><td>${emojis[f]}</td><td>${document.getElementById(`abs-${f}`).innerText}</td><td>${Math.round(scores[f])}</td><td ${cl}>${reasons[f]}</td></tr>`;
        });
        document.getElementById("stats").innerHTML = tHTML;

        // Prediction & Power
        document.getElementById("prediction").innerText = o4.slice(0,3).map(x => emojis[x]).join("");
        let pwr = Math.min(100, Math.round(scores[sorted[0]]/5000*100));
        document.getElementById("pwrFill").style.width = pwr + "%";
        document.getElementById("aiBrain").innerText = pwr > 85 ? "AI STATUS: PATTERN LOCKED 🎯" : "AI STATUS: LEARNING STRATEGY...";
    }
    update();
</script>
</body>
</html>
