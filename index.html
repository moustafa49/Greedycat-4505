<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V54 — THE ULTIMATE FULL BRAIN // ALL-IN-ONE</title>
    <style>
        :root {
            --bg: #020202; --panel: #0d1117; --brd: #30363d;
            --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff003c;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); box-shadow: 0 0 40px rgba(0,0,0,0.7); }
        
        /* Tactical Header */
        .header { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 12px; }
        .main-icons { font-size: 50px; letter-spacing: 12px; margin: 10px 0; text-shadow: 0 0 25px var(--neon); }
        .pwr-badge { background: var(--win); color: #000; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 18px; display: inline-block; }

        /* 🔥 PICKS PANEL (6 TARGETS) 🔥 */
        .sniper-box { background: rgba(0,0,0,0.5); border: 1.5px solid var(--gold); border-radius: 15px; padding: 12px; margin-bottom: 12px; }
        .picks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .pick-card { text-align: center; background: rgba(255,255,255,0.03); padding: 10px 2px; border-radius: 10px; border: 1px solid #222; position: relative; }
        .pick-emoji { font-size: 32px; display: block; }
        .pick-reason { font-size: 9px; color: var(--neon); font-weight: bold; margin-top: 4px; }
        .pick-conf { font-size: 11px; color: var(--win); margin-top: 2px; }

        /* Balancer & History */
        .bal-bar { display: flex; height: 8px; background: #222; border-radius: 10px; overflow: hidden; margin: 10px 0; border: 1px solid #333; }
        #vBar { background: var(--neon); transition: 0.7s; }
        #mBar { background: var(--red); transition: 0.7s; }
        .history { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; margin-bottom: 12px; scrollbar-width: none; }
        .h-node { font-size: 28px; min-width: 40px; height: 40px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .h-node:first-child { border: 2px solid var(--win); transform: scale(1.1); }

        /* Control Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 12px; padding: 12px 0; cursor: pointer; color: #fff; }
        .btn .abs { font-size: 13px; color: var(--neon); font-weight: bold; display: block; margin-top: 5px; }

        .footer { display: flex; gap: 10px; }
        .sys-btn { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--brd); background: #21262d; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="prediction" class="main-icons">?? ?? ??</div>
        <div id="pwr" class="pwr-badge">POWER: 0%</div>
        <div id="aiStatus" style="font-size: 11px; color: var(--gold); margin-top: 8px; font-weight: bold;">SCANNING CYCLES...</div>
    </div>

    <div class="sniper-box">
        <div style="font-size: 10px; color: var(--gold); text-align: center; margin-bottom: 10px; letter-spacing: 3px; font-weight: bold;">LIVE TARGET ACQUISITION (6 PICKS)</div>
        <div id="picksGrid" class="picks-grid"></div>
    </div>

    <div class="bal-bar"><div id="vBar" style="width:50%"></div><div id="mBar" style="width:50%"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:9px; color:#888; margin-bottom:10px;"><span>VEG SECTOR</span><span id="balLabel">BALANCED</span><span>MEAT SECTOR</span></div>

    <div id="history" class="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<span class="abs" id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')">🍅<span class="abs" id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')">🥕<span class="abs" id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')">🌶️<span class="abs" id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')">🦐<span class="abs" id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')">🐄<span class="abs" id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')">🐟<span class="abs" id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')">🐔<span class="abs" id="abs-chicken">0</span></button>
    </div>

    <div class="footer">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:var(--red)">FULL RESET</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"];
    const meat = ["shrimp", "cow", "fish", "chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v54_db") || "[]");

    function add(f) { db.push(f); if(db.length > 2500) db.shift(); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("Reset Full Brain?")) { db = []; save(); } }
    function save() { localStorage.setItem("v54_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        const last = db[len-1], prev = db[len-2], pprev = db[len-3];
        const last20 = db.slice(-20);

        // UI: History
        let hHTML = "";
        for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        // UI: Balancer
        let vCount = last20.filter(x => veg.includes(x)).length;
        let vPerc = (vCount / last20.length) * 100;
        document.getElementById("vBar").style.width = vPerc + "%";
        document.getElementById("mBar").style.width = (100 - vPerc) + "%";
        document.getElementById("balLabel").innerText = vPerc > 75 ? "VEG SATURATED ⚠️" : (vPerc < 25 ? "MEAT SATURATED ⚠️" : "BALANCED");

        let scores = {}, reasons = {};
        [...veg, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;

            let s = abs * 5; 
            reasons[f] = "PATTERN";

            // Advanced Logic
            if (f === last) { s += 5000; reasons[f] = "STREAK"; }
            else if (f === prev) { s += 2200; reasons[f] = "RE-ENTRY"; }
            
            if (len >= 3 && pprev === f && last !== f) { s += 3800; reasons[f] = "ZIGZAG"; }
            
            if (vPerc > 75 && meat.includes(f)) { s += 1500; reasons[f] = "SHIFT"; }
            if (vPerc < 25 && veg.includes(f)) { s += 1500; reasons[f] = "SHIFT"; }
            
            if (abs > 35) { s += (abs * 25); reasons[f] = "RARE DUE"; }

            scores[f] = s;
        });

        let sorted = [...veg, ...meat].sort((a,b) => scores[b] - scores[a]);
        
        // Render 6 Picks
        let picksHTML = "";
        sorted.slice(0, 6).forEach(f => {
            let conf = Math.min(99, Math.round((scores[f]/5000)*100));
            picksHTML += `
                <div class="pick-card">
                    <span class="pick-emoji">${emojis[f]}</span>
                    <span class="pick-reason">${reasons[f]}</span>
                    <div class="pick-conf">${conf}%</div>
                </div>`;
        });
        document.getElementById("picksGrid").innerHTML = picksHTML;

        // Final Header UI
        document.getElementById("prediction").innerText = sorted.slice(0, 3).map(x => emojis[x]).join("");
        let pwr = Math.min(100, Math.round((scores[sorted[0]]/5000)*100));
        document.getElementById("pwr").innerText = `POWER: ${pwr}%`;
        document.getElementById("pwr").style.background = pwr > 85 ? "var(--win)" : "var(--gold)";
        
        const status = document.getElementById("aiStatus");
        if(pwr > 90) status.innerText = "🎯 CRITICAL PATTERN DETECTED. STRIKE NOW.";
        else if(vPerc > 75) status.innerText = "🔄 SECTOR LIMIT REACHED. SHIFT EXPECTED.";
        else status.innerText = "MONITORING SERVER WAVEFORMS...";
    }
    update();
</script>
</body>
</html>
