<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V50 — THE MASTERPIECE // FULL SYSTEM</title>
    <style>
        :root {
            --bg: #050505; --panel: #0d1117; --brd: #30363d;
            --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff003c; --rare: #bc13fe;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 25px; background: var(--panel); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        /* Oracle Header */
        .header { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; position: relative; }
        .main-icons { font-size: 55px; letter-spacing: 15px; color: #fff; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        .pwr-badge { background: var(--win); color: #000; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 18px; display: inline-block; }
        .ai-status { font-size: 12px; color: var(--gold); margin-top: 8px; font-weight: bold; }

        /* Balancer Bar */
        .bal-wrap { margin: 15px 0; text-align: center; }
        .bal-bar { display: flex; height: 12px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        #vBar { width: 50%; background: var(--neon); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #mBar { width: 50%; background: var(--red); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .bal-text { display: flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-top: 5px; font-weight: bold; }

        /* History Stripe */
        .history { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .h-item { font-size: 35px; min-width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .h-item:first-child { border: 2px solid var(--win); transform: scale(1.1); background: rgba(0,255,65,0.1); }

        /* Input Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 15px; padding: 12px 0; cursor: pointer; transition: 0.1s; position: relative; }
        .btn:active { transform: scale(0.92); background: #21262d; }
        .btn .emoji { font-size: 40px; display: block; }
        .btn .abs { font-size: 14px; color: var(--neon); font-weight: bold; margin-top: 5px; display: block; }

        /* Analysis Table */
        .table-area { background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--brd); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #161b22; color: var(--neon); padding: 10px; font-size: 11px; }
        td { padding: 10px; text-align: center; border-top: 1px solid var(--brd); }
        .high-conf { color: var(--win); font-weight: bold; }

        /* Buttons Footer */
        .footer { display: flex; gap: 10px; }
        .sys-btn { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--brd); background: #21262d; color: #fff; font-weight: bold; cursor: pointer; }
        .sys-btn:active { background: #30363d; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 10px; letter-spacing: 3px; color: var(--neon);">ULTIMATE V50 // AI PREDICTOR</div>
        <div class="main-icons" id="prediction">?? ?? ??</div>
        <div class="pwr-badge" id="pwr">POWER: 0%</div>
        <div class="ai-status" id="status">INITIALIZING NEURAL NETWORK...</div>
    </div>

    <div class="bal-wrap">
        <div class="bal-bar"><div id="vBar"></div><div id="mBar"></div></div>
        <div class="bal-text"><span>VEG SECTOR</span><span id="balLabel">BALANCED</span><span>MEAT SECTOR</span></div>
    </div>

    <div class="history" id="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs" id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs" id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs" id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs" id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs" id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs" id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs" id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs" id="abs-chicken">0</span></button>
    </div>

    <div class="table-area">
        <table>
            <thead><tr><th>TARGET</th><th>ABSENCE</th><th>PROBABILITY</th></tr></thead>
            <tbody id="stats"></tbody>
        </table>
    </div>

    <div class="footer">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:var(--red)">FULL RESET</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"];
    const meat = ["shrimp", "cow", "fish", "chicken"];
    const rare = ["chicken", "fish"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    
    let db = JSON.parse(localStorage.getItem("v50_data") || "[]");

    function add(item) {
        db.push(item);
        if (db.length > 2000) db.shift();
        saveAndUI();
    }

    function undo() { db.pop(); saveAndUI(); }
    function reset() { if(confirm("Reset data?")) { db = []; saveAndUI(); } }

    function saveAndUI() {
        localStorage.setItem("v50_data", JSON.stringify(db));
        updateUI();
    }

    function updateUI() {
        const len = db.length;
        if (len === 0) return;

        const last = db[len - 1];
        const last20 = db.slice(-20);

        // Update History
        let hHTML = "";
        for (let i = len - 1; i >= Math.max(0, len - 20); i--) {
            hHTML += `<div class="h-item">${emojis[db[i]]}</div>`;
        }
        document.getElementById("history").innerHTML = hHTML;

        // Update Balancer
        let vCount = last20.filter(x => veg.includes(x)).length;
        let vPerc = (vCount / last20.length) * 100;
        document.getElementById("vBar").style.width = vPerc + "%";
        document.getElementById("mBar").style.width = (100 - vPerc) + "%";
        document.getElementById("balLabel").innerText = vPerc > 75 ? "VEG SATURATED ⚠️" : (vPerc < 25 ? "MEAT SATURATED ⚠️" : "BALANCED");

        // Advanced Logic Engine
        let scores = {};
        [...veg, ...meat].forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            document.getElementById(`abs-${f}`).innerText = abs;

            // 1. BASE SCORE
            let score = abs * 10;

            // 2. STREAK SUPREMACY (تصحيح غلطة النسخة اللي فاتت)
            if (f === last) score += 3000; 

            // 3. ZIGZAG LOGIC (🌶️🍅🌶️ -> 🍅)
            if (len >= 3 && db[len-1] !== db[len-2] && db[len-3] === db[len-1] && f === db[len-2]) {
                score += 2500;
            }

            // 4. RARITY (فراخة وسمكة)
            if (rare.includes(f) && abs > 40) score += (abs * 30);

            // 5. SECTOR SHIFT (تغيير النوع)
            if (vPerc > 75 && meat.includes(f)) score += 800;
            if (vPerc < 25 && veg.includes(f)) score += 800;

            scores[f] = score;
        });

        // Generate Stats Table
        let sorted = [...veg, ...meat].sort((a, b) => scores[b] - scores[a]);
        let tableHTML = "";
        sorted.forEach(f => {
            let prob = Math.min(99, Math.round((scores[f] / 3000) * 100));
            let cl = prob > 80 ? "class='high-conf'" : "";
            tableHTML += `<tr><td>${emojis[f]}</td><td>${document.getElementById(`abs-${f}`).innerText}</td><td ${cl}>${prob}%</td></tr>`;
        });
        document.getElementById("stats").innerHTML = tableHTML;

        // Final Prediction & Power
        const top3 = sorted.slice(0, 3);
        document.getElementById("prediction").innerText = top3.map(x => emojis[x]).join("");
        
        let powerVal = Math.min(100, Math.round((scores[sorted[0]] / 3000) * 100));
        const pwr = document.getElementById("pwr");
        pwr.innerText = `POWER: ${powerVal}%`;
        pwr.style.background = powerVal > 85 ? "var(--win)" : "var(--gold)";

        const status = document.getElementById("status");
        if (powerVal > 85) status.innerText = "🔥 STREAK/PATTERN CONFIRMED. HIGH ENTRY.";
        else if (vPerc > 75) status.innerText = "🔄 SECTOR SATURATED. EXPECTING MEAT SHIFT.";
        else status.innerText = "SCANNING SERVER WAVEFORMS...";
    }

    // Initial run
    updateUI();
</script>
</body>
</html>
