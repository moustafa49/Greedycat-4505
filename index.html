<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V35 — THE NEURAL BRAIN // INTELLIGENT AGENT</title>
    <style>
        :root {
            --bg: #010409; --panel: #0d1117; --brd: #30363d;
            --neon: #58a6ff; --win: #238636; --gold: #f1e05a; --red: #f85149; --purple: #a371f7;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 20px; background: var(--panel); box-shadow: 0 0 30px rgba(88, 166, 255, 0.1); }
        
        /* The Mind Status */
        .brain-header { background: #161b22; border: 1px solid var(--neon); border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brain-status { font-weight: bold; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        .ai-advice { color: var(--gold); font-style: italic; font-size: 14px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-node { background: #000; border: 1px solid var(--brd); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-node b { display: block; font-size: 16px; color: var(--win); }

        /* History Ribbon */
        .history-box { background: #000; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--brd); display: flex; gap: 12px; overflow-x: auto; }
        .h-item { font-size: 35px; min-width: 45px; position: relative; }

        /* Main Input */
        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .btn-item { background: #161b22; border: 1px solid var(--brd); border-radius: 18px; padding: 15px 5px; cursor: pointer; text-align: center; position: relative; }
        .emoji { font-size: 45px; display: block; }
        .abs-val { font-size: 18px; color: var(--neon); font-weight: bold; }

        /* AI Prediction Boxes */
        .ai-box { background: #161b22; border: 1px solid var(--brd); border-radius: 15px; padding: 15px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .ai-box::before { content: 'AI PREDICTION'; position: absolute; top: 0; right: 0; background: var(--purple); color: black; font-size: 8px; padding: 2px 8px; font-weight: bold; }
        .strat-line { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #30363d; }
        .strat-name { font-size: 13px; font-weight: bold; color: var(--gold); width: 120px; }
        .strat-res { font-size: 30px; letter-spacing: 12px; flex-grow: 1; text-align: center; }

        /* The Intelligence Table */
        .intel-table { width: 100%; border-collapse: collapse; background: #000; border-radius: 12px; overflow: hidden; font-size: 12px; }
        .intel-table th, .intel-table td { padding: 10px; border: 1px solid var(--brd); text-align: center; }
        .intel-table th { background: #161b22; color: var(--neon); }
        .high-risk { color: var(--red); font-weight: bold; }

        .sys-btn { flex: 1; padding: 15px; border-radius: 12px; background: #21262d; color: white; border: 1px solid var(--brd); cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brain-header">
        <div class="brain-status" id="brainMood">🧠 ANALYZING MOOD...</div>
        <div class="ai-advice" id="aiAdvice">Wait for more data to sync...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-node"><small>SYNC</small><b id="sync">0%</b></div>
        <div class="stat-node"><small>MEAT HEAT</small><b id="heat">0%</b></div>
        <div class="stat-node"><small>PATTERN</small><b id="patt">STABLE</b></div>
        <div class="stat-node"><small>RISK</small><b id="risk">LOW</b></div>
    </div>

    <div class="history-box" id="history"></div>

    <div class="main-grid">
        <button class="btn-item" onclick="add('corn')"><span class="emoji">🌽</span><span class="abs-val" id="abs-corn">0</span></button>
        <button class="btn-item" onclick="add('tomato')"><span class="emoji">🍅</span><span class="abs-val" id="abs-tomato">0</span></button>
        <button class="btn-item" onclick="add('carrot')"><span class="emoji">🥕</span><span class="abs-val" id="abs-carrot">0</span></button>
        <button class="btn-item" onclick="add('pepper')"><span class="emoji">🌶️</span><span class="abs-val" id="abs-pepper">0</span></button>
        <button class="btn-item" onclick="add('shrimp')"><span class="emoji">🦐</span><span class="abs-val" id="abs-shrimp">0</span></button>
        <button class="btn-item" onclick="add('cow')"><span class="emoji">🐄</span><span class="abs-val" id="abs-cow">0</span></button>
        <button class="btn-item" onclick="add('fish')"><span class="emoji">🐟</span><span class="abs-val" id="abs-fish">0</span></button>
        <button class="btn-item" onclick="add('chicken')"><span class="emoji">🐔</span><span class="abs-val" id="abs-chicken">0</span></button>
    </div>

    <div class="ai-box">
        <div class="strat-line"><div class="strat-name">OPTIMAL (3+2)</div><div id="s32" class="strat-res">--</div></div>
        <div class="strat-line"><div class="strat-name">ATTACK (3+3)</div><div id="s33" class="strat-res">--</div></div>
        <div class="strat-line"><div class="strat-name">DEFENSE (2+2)</div><div id="s22" class="strat-res">--</div></div>
    </div>

    <table class="intel-table">
        <thead>
            <tr>
                <th>ITEM</th>
                <th>ABS</th>
                <th>MAX</th>
                <th>AI SCORE</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="intelBody"></tbody>
    </table>

    <div style="display:flex; gap:10px;">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="wipe()" style="color:var(--red)">WIPE MEMORY</button>
    </div>
</div>

<script>
    const veg = ["corn","tomato","carrot","pepper"];
    const meat = ["shrimp","cow","fish","chicken"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v35_db") || "[]");
    let maxAbs = JSON.parse(localStorage.getItem("v35_max") || "{}");
    let wins = 0; let rounds = 0; let lastPicks = [];

    function add(f) {
        if(lastPicks.length > 0) { rounds++; if(lastPicks.includes(f)) wins++; }
        db.push(f); if(db.length > 3000) db.shift();
        localStorage.setItem("v35_db", JSON.stringify(db));
        update();
    }

    function update() {
        let len = db.length;
        let vS = {}; let mS = {};
        let intelHTML = "";

        // History
        let hHTML = ""; let streak = 1;
        for(let i=len-1; i>=Math.max(0, len-25); i--) {
            if(db[i] === db[i-1]) streak++; else {
                hHTML += `<div class="h-item">${emojis[db[i]]}</div>`;
                streak = 1;
            }
        }
        document.getElementById("history").innerHTML = hHTML;

        // Neural Analysis Logic
        [...veg, ...meat].forEach(f => {
            let lastIdx = db.lastIndexOf(f);
            let abs = (lastIdx === -1) ? len : len - 1 - lastIdx;
            if(!maxAbs[f] || abs > maxAbs[f]) maxAbs[f] = abs;
            document.getElementById(`abs-${f}`).innerText = abs;
            
            // The Intelligence Formula (Weighted)
            let freq = db.slice(-50).filter(x=>x===f).length;
            let score = (abs * 15) + (freq * 10);
            
            // Magnet Logic (Relationship)
            if(len > 1 && db[len-1] === 'corn' && f === 'shrimp') score += 50; 

            if(veg.includes(f)) vS[f] = score; else mS[f] = score;

            let status = abs > (maxAbs[f] * 0.8) ? "<span class='high-risk'>HOT</span>" : "STABLE";
            intelHTML += `<tr><td>${emojis[f]}</td><td>${abs}</td><td>${maxAbs[f]}</td><td>${score}</td><td>${status}</td></tr>`;
        });
        document.getElementById("intelBody").innerHTML = intelHTML;

        const sv = Object.entries(vS).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
        const sm = Object.entries(mS).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);

        // Strategies
        const s32 = [...sv.slice(0,3), ...sm.slice(0,2)];
        const s33 = [...sv.slice(0,3), ...sm.slice(0,3)];
        const s22 = [...sv.slice(0,2), ...sm.slice(0,2)];
        lastPicks = s33;

        document.getElementById("s32").innerText = s32.map(x=>emojis[x]).join("");
        document.getElementById("s33").innerText = s33.map(x=>emojis[x]).join("");
        document.getElementById("s22").innerText = s22.map(x=>emojis[x]).join("");

        // Brain Mood & Advice
        let heat = (db.slice(-10).filter(x=>meat.includes(x)).length * 10);
        document.getElementById("heat").innerText = heat + "%";
        document.getElementById("sync").innerText = rounds > 0 ? Math.round((wins/rounds)*100) + "%" : "0%";

        const mood = document.getElementById("brainMood");
        const advice = document.getElementById("aiAdvice");
        
        if(heat < 20) {
            mood.innerText = "📉 ACCUMULATION PHASE";
            advice.innerText = "Server is collecting. Play safe with 2+2.";
        } else if(heat > 60) {
            mood.innerText = "🌋 EXPLOSION PHASE";
            advice.innerText = "High meat activity! Use 3+3 strategy now.";
        } else {
            mood.innerText = "⚖️ BALANCED MOOD";
            advice.innerText = "Normal cycle. 3+2 is the most stable choice.";
        }
    }

    function undo() { db.pop(); update(); }
    function wipe() { if(confirm("CLEAR ALL MEMORY?")) { db=[]; maxAbs={}; localStorage.clear(); location.reload(); } }
    update();
</script>
</body>
</html>
