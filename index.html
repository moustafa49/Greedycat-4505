<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V52 — SNIPER ELITE // THE FINAL VISION</title>
    <style>
        :root {
            --bg: #050505; --panel: #0d1117; --brd: #30363d;
            --neon: #00f2ff; --win: #00ff41; --gold: #ffd700; --red: #ff003c; --purple: #bc13fe;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; border: 1px solid var(--brd); padding: 15px; border-radius: 25px; background: var(--panel); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* Tactical Header */
        .header { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .main-icons { font-size: 50px; letter-spacing: 10px; margin: 5px 0; text-shadow: 0 0 20px var(--neon); }
        .pwr-bar { height: 6px; background: #222; border-radius: 10px; margin: 10px auto; width: 80%; overflow: hidden; }
        #pwrFill { height: 100%; width: 0%; background: var(--win); transition: 0.5s; }

        /* 🔥 LIVE SNIPER PICKS (اللوحة الاحترافية) 🔥 */
        .sniper-box { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .sniper-title { font-size: 10px; color: var(--gold); letter-spacing: 3px; text-align: center; margin-bottom: 12px; font-weight: bold; }
        .picks-grid { display: flex; justify-content: space-around; gap: 10px; }
        .pick-card { text-align: center; flex: 1; background: rgba(255,255,255,0.03); padding: 10px 5px; border-radius: 10px; border: 1px solid #222; }
        .pick-emoji { font-size: 35px; display: block; margin-bottom: 5px; }
        .pick-reason { font-size: 9px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .pick-conf { font-size: 11px; color: var(--win); margin-top: 3px; }

        /* Balancer */
        .bal-wrap { margin-bottom: 15px; }
        .bal-bar { display: flex; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        #vBar { background: var(--neon); transition: 0.8s; }
        #mBar { background: var(--red); transition: 0.8s; }

        /* History & Grid */
        .history { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .h-node { font-size: 28px; min-width: 38px; height: 38px; background: #161b22; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { background: #161b22; border: 1px solid var(--brd); border-radius: 12px; padding: 10px 0; cursor: pointer; color: #fff; }
        .btn .abs { font-size: 12px; color: var(--neon); display: block; margin-top: 4px; }

        /* Footer */
        .footer { display: flex; gap: 10px; }
        .sys-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--brd); background: #21262d; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="main-icons" id="prediction">?? ?? ??</div>
        <div class="pwr-bar"><div id="pwrFill"></div></div>
        <div id="pwrText" style="font-size: 12px; color: var(--win);">SYSTEM READY</div>
    </div>

    <div class="sniper-box">
        <div class="sniper-title">TARGET ACQUISITION // LIVE PICKS</div>
        <div class="picks-grid" id="picksDisplay">
            </div>
    </div>

    <div class="bal-wrap">
        <div class="bal-bar"><div id="vBar" style="width:50%"></div><div id="mBar" style="width:50%"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:9px; color:#666; margin-top:4px;"><span>VEG SECTOR</span><span id="balHint">STABLE</span><span>MEAT SECTOR</span></div>
    </div>

    <div class="history" id="history"></div>

    <div class="grid">
        <button class="btn" onclick="add('corn')">🌽<span class="abs" id="abs-corn">0</span></button>
        <button class="btn" onclick="add('tomato')">🍅<span class="abs" id="abs-tomato">0</span></button>
        <button class="btn" onclick="add('carrot')">🥕<span class="abs" id="abs-carrot">0</span></button>
        <button class="btn" onclick="add('pepper')">🌶️<span class="abs" id="abs-pepper">0</span></button>
        <button class="btn" onclick="add('shrimp')">🦐<span class="abs" id="abs-shrimp">0</span></button>
        <button class="btn" onclick="add('cow')">🐄<span class="abs" id="abs-cow">0</span></button>
        <button class="btn" onclick="add('fish')">🐟<span class="abs" id="abs-fish">0</span></button>
        <button class="btn" onclick="add('chicken')">🐔<span class="abs" id="abs-chicken">0</span></button>
    </div>

    <div class="footer">
        <button class="sys-btn" onclick="undo()">UNDO</button>
        <button class="sys-btn" onclick="reset()" style="color:var(--red)">RESET</button>
    </div>
</div>

<script>
    const veg = ["corn", "tomato", "carrot", "pepper"];
    const meat = ["shrimp", "cow", "fish", "chicken"];
    const rare = ["chicken", "fish"];
    const emojis = {corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",shrimp:"🦐",cow:"🐄",fish:"🐟",chicken:"🐔"};
    let db = JSON.parse(localStorage.getItem("v52_db") || "[]");

    function add(f) { db.push(f); if(db.length > 2000) db.shift(); save(); }
    function undo() { db.pop(); save(); }
    function reset() { if(confirm("Clear Brain?")) { db = []; save(); } }
    function save() { localStorage.setItem("v52_db", JSON.stringify(db)); update(); }

    function update() {
        const len = db.length; if(len === 0) return;
        const last = db[len-1], prev = db[len-2], pprev = db[len-3];
        const last20 = db.slice(-20);

        // History UI
        let hHTML = "";
        for(let i=len-1; i>=Math.max(0, len-20); i--) hHTML += `<div class="h-node">${emojis[db[i]]}</div>`;
        document.getElementById("history").innerHTML = hHTML;

        // Balancer logic
        let vCount = last20.filter(x => veg.includes(x)).length;
        let vPerc = (vCount / last20.length) * 100;
        document.getElementById("vBar").style.width = vPerc + "%";
        document.getElementById("mBar").style.width = (100 - vPerc) + "%";

        let scores = {}, reasons = {};

        [...veg, ...meat].forEach(f => {
            let abs = (db.lastIndexOf(f) === -1) ? len : len - 1 - db.lastIndexOf(f);
            document.getElementById(`abs-${f}`).innerText = abs;

            let s = abs * 5; 
            reasons[f] = "Normal";

            if (f === last) { s += 4000; reasons[f] = "STREAK"; }
            else if (f === prev && last !== prev) { s += 1500; reasons[f] = "RE-ENTRY"; }
            
            if (len >= 3 && pprev === f && last !== f) { s += 3000; reasons[f] = "ZIGZAG"; }
            
            if (rare.includes(f) && abs > 40) { s += (abs * 30); reasons[f] = "RARE DUE"; }
            
            if (vPerc > 75 && meat.includes(f)) { s += 1200; reasons[f] = "SHIFT"; }
            if (vPerc < 25 && veg.includes(f)) { s += 1200; reasons[f] = "SHIFT"; }

            scores[f] = s;
        });

        let sorted = [...veg, ...meat].sort((a,b) => scores[b] - scores[a]);
        
        // Render Picks Cards
        let picksHTML = "";
        sorted.slice(0, 4).forEach(f => {
            let conf = Math.min(99, Math.round((scores[f]/4000)*100));
            picksHTML += `
                <div class="pick-card">
                    <span class="pick-emoji">${emojis[f]}</span>
                    <span class="pick-reason">${reasons[f]}</span>
                    <div class="pick-conf">${conf}%</div>
                </div>`;
        });
        document.getElementById("picksDisplay").innerHTML = picksHTML;

        // Header Update
        document.getElementById("prediction").innerText = sorted.slice(0, 3).map(x => emojis[x]).join("");
        let mainPwr = Math.min(100, Math.round((scores[sorted[0]]/4000)*100));
        document.getElementById("pwrFill").style.width = mainPwr + "%";
        document.getElementById("pwrText").innerText = `CONFIDENCE: ${mainPwr}%`;
    }
    update();
</script>
</body>
</html>
